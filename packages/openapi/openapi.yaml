      summary: List a site's media assets (Media Optimizer, ADR-043)
      description: |
        Cursor-paginated media library mirror with a summary rollup. Gated on
        site:read + per-site access. DTOs are hand-rolled (c.JSON), not ogen.
      tags: [media]
      parameters:
