              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/sites:
    post:
      operationId: createSite
      summary: Create a site (site-first enrollment)
      description: |
        M21 / Phase 5.7 (ADR-041) — the site-first "Add site" flow. Creates a
        site row in `pending_enrollment` AND mints a single-use, site-bound
        enrollment code in one call. The response carries the new `site_id` plus
        the once-shown `enrollment_code` and its `expires_at` so the dashboard
        can immediately show the install modal and subscribe to the
        `/api/v1/sites/events` SSE stream for this site_id.

        BREAKING CHANGE vs. pre-M21: the 201 body is now
        `SiteEnrollmentCode` ({site_id, enrollment_code, expires_at}) instead of
        a bare `Site`. When the connection-lifecycle service is disabled (dev
        builds with no SSE bus) the control plane falls back to the legacy
        create that returns a bare `Site`. Requires operator+.
      tags: [sites]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteCreate"
      responses:
        "201":
          description: Site created (pending_enrollment) with a once-shown enrollment code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteEnrollmentCode"
        "409":
          description: |
            Site URL already exists for this tenant. The `details` object carries
            `site_id` (UUID string) and `connection_state` (string) of the
            existing row so the web can branch: offer "Cancel and re-add" when
            `pending_enrollment`, "Reconnect" when `archived`/`disconnected`,
            or a generic "already exists" message otherwise.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Error"
                  - type: object
                    properties:
                      details:
                        type: object
                        required: [site_id, connection_state]
                        properties:
                          site_id:
                            type: string
                            format: uuid
                            description: ID of the existing site with this URL.
                          connection_state:
                            type: string
                            enum: [pending_enrollment, connected, degraded, disconnected, revoked, archived]
                            description: Current connection state of the existing site.
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      operationId: listSites
      summary: List sites for the current tenant
      description: |
        Lists the tenant's sites. By default (ADR-041) archived sites are hidden.
        Pass `?state=<connection_state>` to filter to exactly one state (e.g.
        `?state=archived` for the archived chip), or `?include_archived=true` as
        a convenience alias that returns only the archived sites.
      tags: [sites]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: tag
          in: query
          required: false
          description: Filter to sites carrying this tag.
          schema:
            type: string
            maxLength: 64
        - name: state
          in: query
          required: false
          description: |
            Filter to a single connection_state. When omitted, archived sites are
            hidden.
          schema:
            type: string
            enum: [pending_enrollment, connected, degraded, disconnected, revoked, archived]
        - name: include_archived
          in: query
          required: false
          description: Convenience alias for state=archived.
          schema:
            type: boolean
      responses:
        "200":
          description: A page of sites
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteList"
  /api/v1/sites/pairing-codes:
    post:
      operationId: createPairingCode
      summary: Generate a one-time agent pairing code
      description: |
        Generates a short-lived, single-use, high-entropy pairing code for the
        current tenant. The plaintext code is returned ONCE in this response and
        is never retrievable again. An agent presents it to POST /enroll. Requires
        operator+.
      tags: [sites]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PairingCodeCreate"
      responses:
        "201":
          description: Pairing code created (plaintext shown once)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PairingCode"
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/sites/{siteId}/tags:
    put:
      operationId: setSiteTags
      summary: Replace the tag set on a site
      tags: [sites]
