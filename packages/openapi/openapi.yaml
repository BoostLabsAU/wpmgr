openapi: 3.1.0
info:
  title: WPMgr API
  version: 0.15.0
  description: |
    Control-plane REST API for **WPMgr**, the open-source, self-hostable
    WordPress fleet management platform (AGPL-3.0). One control plane enrolls,
    monitors, updates, backs up, optimizes, and secures many WordPress sites.

    ## Authentication
    - **Dashboard / operator routes** use a session cookie established at login
      (email and password, or OIDC single sign-on). Role-based access
      (owner, admin, operator, viewer) and per-site sharing are enforced
      server-side by Postgres row-level security.
    - **Agent routes** (`/agent/v1/*`, `/enroll`) use Ed25519 signed requests:
      each site's agent plugin signs its calls with a per-site key the control
      plane verifies. The control plane never holds a site secret.
    - **API keys** (`wpmgr_<prefix>_<secret>`) carry the same role matrix as a
      user session, for programmatic access.

    Endpoints declared as `text/event-stream` are live Server-Sent Event
    streams. Documentation tools render them but cannot exercise them from the
    in-page "try it" client.
  contact:
    name: WPMgr
    url: https://github.com/mosamlife/wpmgr
  license:
    name: AGPL-3.0-only
    url: https://www.gnu.org/licenses/agpl-3.0.txt
servers:
  - url: https://manage.wpmgr.app
    description: Production
  - url: http://localhost:8080
    description: Local development
tags:
  - name: system
    description: Liveness, readiness, and version probes.
  - name: auth
    description: Login, logout, session, and first-run owner bootstrap.
  - name: tenants
    description: Tenant (organization) lifecycle and settings.
  - name: orgs
    description: Organization configuration and membership.
  - name: members
    description: Organization members and their roles (owner, admin, operator, viewer).
  - name: invitations
    description: Tokenized, single-use invitations to join an organization.
  - name: sites
    description: WordPress site enrollment, the connection-state machine, tags, and one-click autologin.
  - name: diagnostics
    description: Per-site Site Health diagnostics (14 categories) and PHP error monitoring.
  - name: backups
    description: Scheduled and on-demand backups, snapshots, restore, and SQL inspection.
  - name: destinations
    description: Backup destinations (control-plane bucket, customer S3, or a local folder).
  - name: updates
    description: WordPress core, plugin, and theme updates with dry-run preview and automatic rollback.
  - name: media
    description: Image optimization to AVIF and WebP, library sync, and savings metrics.
  - name: uptime
    description: Active uptime monitoring, latency reports, TLS certificate tracking, and alerts.
  - name: activity
    description: Hash-chained WordPress activity log and the filtered activity feed.
  - name: audit
    description: Tamper-evident, hash-chained organization audit log.
  - name: security
    description: Core file-integrity scans, brute-force protection, and the IP firewall.
  - name: api-keys
    description: Role-scoped, hashed, revocable API keys.
  - name: shares
    description: Per-site sharing with outside collaborators.
  - name: agent
    description: Ed25519 signed agent-to-control-plane endpoints (metadata, heartbeat, diagnostics, backups).
  - name: loginbrand
    description: Per-site wp-login whitelabeling (logo, link, message).
  - name: performance
    description: Per-site Performance Suite (page cache, CSS/JS optimization, RUCSS, CDN, database cleanup) plus portfolio-wide bulk cache actions.
paths:
  /healthz:
    get:
      operationId: getHealthz
      summary: Liveness probe
      tags: [system]
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
  /readyz:
    get:
      operationId: getReadyz
      summary: Readiness probe
      description: Returns 200 when the service can serve traffic (DB reachable).
      tags: [system]
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Readiness"
        "503":
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Readiness"
  /auth/register:
    post:
      operationId: register
      summary: Register (first-run bootstrap or self-serve)
      description: |
        On first run (zero users in the database) this bootstraps the instance:
        creates the first user verified and active, creates their tenant, and
        establishes an immediate session (201 + Me). After the first user exists,
        registration is open self-serve: the account is created in a pending
        state, a verification email is sent, and the response is 200
        {ok: true, pending: true}. The user must verify their email via
        POST /auth/verify-email before they can log in.
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: First-run bootstrap — user registered, session established
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"
        "200":
          description: Self-serve signup accepted; verification email sent
          content:
            application/json:
              schema:
                type: object
                required: [ok, pending]
                properties:
                  ok:
                    type: boolean
                  pending:
                    type: boolean
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/password/forgot:
    post:
      operationId: forgotPassword
      summary: Request a password-reset email
      description: |
        Always returns 200 {ok: true} whether or not the email maps to an
        account (enumeration-safe). A reset-link email is sent when the account
        exists and is active.
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Request accepted (enumeration-safe)
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
  /auth/password/reset:
    post:
      operationId: resetPassword
      summary: Consume a password-reset token and set a new password
      description: |
        Validates the one-time reset token and replaces the user's password.
        Does not establish a session; the user must log in separately. Returns
        410 when the token is expired, already used, or not found.
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
        "410":
          description: Token expired, already used, or not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Validation failed (e.g. password too weak)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/verify-email:
    post:
      operationId: verifyEmail
      summary: Verify a self-serve signup email and establish a session
      description: |
        Consumes the one-time verification token sent during self-serve
        registration, activates the account, and establishes a session so the
        user lands logged in. Returns 410 when the token is expired or already
        consumed.
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Email verified; session established
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"
        "410":
          description: Token expired or already consumed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/verification/resend:
    post:
      operationId: resendVerification
      summary: Re-send the email verification link
      description: |
        Always returns 200 {ok: true} whether or not the email maps to a
        pending account (enumeration-safe). A new verification email is sent
        when the account exists and is still pending verification.
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Request accepted (enumeration-safe)
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
  /auth/login:
    post:
      operationId: login
      summary: Email + password login
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated; session cookie set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/logout:
    post:
      operationId: logout
      summary: Destroy the current session
      tags: [auth]
      responses:
        "204":
          description: Logged out
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/me:
    get:
      operationId: getMe
      summary: Current user, memberships, and active tenant
      tags: [auth]
      responses:
        "200":
          description: The authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/oidc/login:
    get:
      operationId: oidcLogin
      summary: Begin OIDC login (redirect to provider)
      description: Redirects (302) to the OIDC provider. Returns 501 if OIDC is disabled.
      tags: [auth]
      responses:
        "302":
          description: Redirect to the OIDC provider
        "501":
          description: OIDC is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/oidc/callback:
    get:
      operationId: oidcCallback
      summary: OIDC redirect callback
      tags: [auth]
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Authenticated via OIDC; session cookie set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"
        "401":
          description: OIDC verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "501":
          description: OIDC is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/members:
    get:
      operationId: listMembers
      summary: List members of the active tenant
      tags: [members]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: A page of memberships
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembershipList"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: inviteMember
      summary: Invite/create a member in the active tenant (admin+)
      tags: [members]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteRequest"
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Membership"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Already a member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/members/{userId}:
    patch:
      operationId: patchMember
      summary: Change a member's role (admin+; privilege-ceiling enforced)
      tags: [members]
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchMemberRequest"
      responses:
        "200":
          description: Role updated; returns the updated membership
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Membership"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permission or last-owner protection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Member not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteMember
      summary: Remove a member from the active tenant (admin+; last-owner protected)
      tags: [members]
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "204":
          description: Member removed
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permission or last-owner protection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Member not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/orgs:
    post:
      operationId: createOrg
      summary: Create a new organisation; the caller becomes the owner
      tags: [orgs]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrgRequest"
      responses:
        "201":
          description: Organisation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Org"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Slug already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/orgs/{orgId}/activate:
    post:
      operationId: activateOrg
      summary: Switch the session's active organisation (must be a member)
      tags: [orgs]
      parameters:
        - $ref: "#/components/parameters/OrgId"
      responses:
        "200":
          description: Active organisation switched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivateOrgResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not a member of the requested organisation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Organisation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/sites/{siteId}/shares:
    get:
      operationId: listSiteShares
      summary: List collaborators for a site (admin+)
      tags: [shares]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      responses:
        "200":
          description: List of site shares
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteShareList"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Site not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createSiteShare
      summary: |
        Grant site access to an email (admin+; org-scope only). If the email
        matches a known user the share is immediate (201); otherwise an invitation
        is created and the accept link is returned (202).
      tags: [shares]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSiteShareRequest"
      responses:
        "201":
          description: Share created immediately (known user)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteShareGrantResponse"
        "202":
          description: Invitation created (unknown user); accept_link returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteShareGrantResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permission or site-scoped principal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/sites/{siteId}/shares/{userId}:
    delete:
      operationId: deleteSiteShare
      summary: Revoke a collaborator's site access (admin+; org-scope only)
      tags: [shares]
      parameters:
        - $ref: "#/components/parameters/SiteId"
        - $ref: "#/components/parameters/UserId"
      responses:
        "204":
          description: Share revoked
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permission or site-scoped principal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Share not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/shared-with-me:
    get:
      operationId: listSharedWithMe
      summary: List sites shared to the authenticated user (any logged-in user)
      tags: [shares]
      responses:
        "200":
          description: Shares granted to this user across all orgs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteShareList"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/invitations/accept:
    post:
      operationId: acceptInvitation
      summary: |
        Accept an invitation by token (public; creates/links user and session).
        Accepts both org-scope invitations (creates a membership) and site-scope
        invitations (creates a site_shares row). Validates token hash, email
        binding, expiry, single-use, and rate-limit.
      tags: [invitations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptInvitationRequest"
      responses:
        "200":
          description: Invitation accepted; session established
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptInvitationResponse"
        "400":
          description: Invalid token, expired, already used, or email mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Too many attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/api-keys:
    get:
      operationId: listApiKeys
      summary: List API keys for the active tenant (admin+)
      tags: [api-keys]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: A page of API keys (no secrets)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyList"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createApiKey
      summary: Create an API key (admin+); the secret is shown once
      tags: [api-keys]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApiKeyCreate"
      responses:
        "201":
          description: API key created; token returned once
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyCreated"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/api-keys/{apiKeyId}:
    delete:
      operationId: revokeApiKey
      summary: Revoke an API key (admin+)
      tags: [api-keys]
      parameters:
        - $ref: "#/components/parameters/ApiKeyId"
      responses:
        "204":
          description: API key revoked
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: API key not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/sites/{siteId}/destinations:
    get:
      operationId: listSiteDestinations
      summary: List configured backup destinations for a site
      description: |
        ADR-036 P1 storage adapter. Returns every destination configured on the
        site (`cp` / `local` / `s3_compat`). The encrypted S3 secret is NEVER
        returned; `has_secret` reports whether one is stored.
      tags: [destinations]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      responses:
        "200":
          description: A list of destinations.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteDestinationList"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createSiteDestination
      summary: Add a backup destination to a site
      tags: [destinations]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteDestinationCreate"
      responses:
        "201":
          description: Destination created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteDestination"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/sites/{siteId}/destinations/test:
    post:
      operationId: testSiteDestination
      summary: Verify credentials for a destination without persisting them
