  /api/v1/sites/{siteId}/media/jobs/{jobId}:
    get:
      operationId: getMediaJob
      summary: Get a media job + its variant results
      tags: [media]
      parameters:
        - $ref: "#/components/parameters/SiteId"
        - { name: jobId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The job detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MediaJobDetail" }
  /api/v1/sites/events:
    get:
      operationId: streamSiteEvents
      summary: Connection-lifecycle SSE stream (tenant-scoped)
      description: |
        M21 / ADR-038 — a single tenant-scoped Server-Sent Events stream of
        connection-lifecycle events (site.created, site.state_changed,
        site.revoked, site.disconnected, site.archived, site.restored). The
        client filters by site_id in the browser. Supports `?since=<event_id>`
        (or the `Last-Event-ID` header) to replay missed events from the durable
        journal (~5 min retention) on reconnect; each frame carries an `id:`
        (ULID) line. 15s keepalive comments; session-auth, requires site:read.
      tags: [sites]
      parameters:
        - name: since
          in: query
          required: false
          description: Replay events strictly after this event_id (ULID cursor).
          schema:
            type: string
      responses:
        "200":
          description: An event stream (text/event-stream)
          content:
            text/event-stream:
              schema:
                type: string
  /api/v1/sites/{siteId}/enrollment-codes:
    post:
      operationId: beginReEnrollment
      summary: Begin re-enrollment (fresh enrollment code)
      description: |
        M21 / ADR-041 — moves an existing revoked/disconnected/archived site back
        to `pending_enrollment` (bumping connection_generation) and mints a fresh
        site-bound enrollment code under the SAME site_id (preserving backup/scan
        history). Returns the once-shown code. Requires operator+.
      tags: [sites]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      responses:
        "201":
          description: Re-enrollment code minted (plaintext shown once)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteEnrollmentCode"
        "409":
          description: Site is in a state from which re-enrollment is not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/sites/{siteId}/revoke:
    post:
      operationId: revokeSite
      summary: Revoke a site's agent connection
      description: |
        M21 / ADR-041 — operator action. Transitions the site to `revoked` and
        queues a `revoke` instruction returned on the agent's next heartbeat,
        accompanied by a short-lived signed token (`revoke_token`) the agent
        verifies before it wipes its keys + self-deactivates (ADR-040 addendum).
        The agent_public_key is KEPT (not nulled) so the agent can still
        authenticate the heartbeat that delivers the revoke; a later re-enroll
        overwrites the key on the same row (partial unique index). Requires
        operator+ and org scope (a site-scoped collaborator cannot revoke).
      tags: [sites]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteLifecycleReason"
      responses:
        "200":
          description: The updated site
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Site"
        "409":
          description: Illegal transition from the site's current state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/sites/{siteId}/archive:
    post:
      operationId: archiveSite
      summary: Archive a site (terminal soft-delete)
      description: |
        M21 / ADR-041 — operator action. Transitions the site to `archived`
        (terminal soft-delete); hidden from the default sites list. History is
        preserved. Requires operator+.
      tags: [sites]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteLifecycleReason"
      responses:
        "204":
          description: Site archived
        "409":
          description: Illegal transition from the site's current state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/sites/{siteId}/restore:
    post:
      operationId: restoreSite
      summary: Restore (un-archive) a site
      description: |
        M21 / ADR-041 — operator action. Un-archives a site back to
        `disconnected`. Only valid from `archived`. Requires operator+.
      tags: [sites]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      responses:
        "200":
          description: The updated site
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Site"
        "409":
          description: Site is not archived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/sites/{siteId}/cancel:
    post:
      operationId: cancelEnrollment
      summary: Cancel a pending enrollment (hard-delete)
      description: |
        Hard-deletes a site that is in `pending_enrollment` AND has **never
        connected** (`enrolled_at` is NULL and `agent_public_key` is absent).
        This is the "Cancel" action in the enrollment modal — it frees the URL
        so the operator can immediately re-add the same site.

        The never-connected guard is enforced server-side (NOT by the caller):
        `connection_state == pending_enrollment` AND `enrolled_at IS NULL` AND
        `agent_public_key == ""` must all hold. If the site has ever connected
        (enrolled at least once) the request is rejected with
        `code: "not_cancellable"` — use `archive` or `revoke` instead.

        On success a `site.deleted` SSE event is published to the tenant stream
        so open dashboards can remove the row without a poll.

        Requires `site:write` + org scope + site access (same chain as
        `archive`/`revoke`).
      tags: [sites]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      responses:
        "204":
          description: Site hard-deleted; URL is now free.
        "404":
          description: Site not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: |
            Site cannot be cancelled because it has connected at least once
            (`not_cancellable`). Use `archive` or `revoke` instead.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /enroll:
    post:
      operationId: enroll
      summary: Agent enrollment (public)
      description: |
        Called by an agent (NOT an authenticated control-plane user) to enroll a
        site using a pairing code. The tenant is derived entirely from the code.
        On success the site is created (or, if the URL already exists for the
        tenant, its agent key is rotated) and the control-plane PUBLIC signing
        key is returned so the agent can verify CP->agent commands. The code is
        consumed (single-use).
      tags: [agent]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnrollRequest"
      responses:
        "200":
          description: Enrolled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrollResponse"
        "401":
          description: Invalid or expired pairing code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Pairing code already used, or agent key already bound
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/sites/{siteId}/autologin:
    post:
      operationId: createAutologin
      summary: Mint a one-click login URL into a managed WordPress site
      description: |
        Mints a single-use, ~60-second nonce + Ed25519 JWT (ADR-031) and
        returns a redirect URL of the form
        `{site.url}/wp-json/wpmgr/v1/autologin?token=<jwt>&redirect_to=<urlencoded>`
        the operator's browser should follow. The WordPress agent verifies the
        JWT and POSTs back to `/agent/v1/autologin/consume` to atomically
        consume the nonce, then establishes a wp-admin session as the requested
        user (or the first administrator when `target_wp_user_login` is empty).

        Authorization: requires the `site:autologin` permission (owner+admin).
        Operator and viewer roles are explicitly denied.

        Rate-limited per `(initiator_user_id, site_id)` (10/min) and per
        `site_id` (30/min). A 429 response carries `retry_after_seconds` in the
        body and a `Retry-After` header in seconds.

        2FA step-up (HTTP 409 `2fa_required`) is feature-flagged off in V0;
        the 409 path is unreachable until both `WPMGR_AUTOLOGIN_REQUIRE_2FA_STEP_UP`
        and the per-site `require_2fa_step_up` policy are true AND a future
        2FA enrollment system is in place.

        The minted JWT is NEVER returned in the response body apart from
        being embedded in `redirect_url`; it is NEVER recorded in the audit
        trail — the audit row stores only the nonce id and outcome.
      tags: [sites]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutologinCreate"
      responses:
        "200":
          description: Autologin minted; follow `redirect_url` to land in wp-admin.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutologinResponse"
        "403":
          description: |
            RBAC denied (`rbac_denied`) or autologin disabled by policy
            (`policy_disabled`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Site not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: |
            A two-factor step-up is required (`2fa_required`). Unreachable
            today; feature-flagged off until the 2FA system ships.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: |
            Rate-limited per `(initiator_user_id, site_id)` or per `site_id`.
            Carries `retry_after_seconds` and a `Retry-After` header.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutologinRateLimited"
  /agent/v1/autologin/consume:
    post:
      operationId: agentAutologinConsume
      summary: Consume a one-click login nonce (agent-authenticated)
      description: |
        Called by the WordPress agent after it has verified the operator's
        JWT, to atomically consume the nonce and learn the WP login + the
        allowed WP roles. The control plane consults Redis (GETDEL) first as
        the sub-millisecond hot path and falls back to a single
        `UPDATE autologin_tokens ... RETURNING` in Postgres. Exactly one
        agent wins the race per nonce.

        The agent is authenticated by the M2 Ed25519 signed-request scheme
        (see AgentSignature); the verified site identity is compared to the
        body's `site_id` — a mismatch returns 403 `site_mismatch`. A nonce
        that never existed, was already consumed, or has expired returns 410
        `nonce_unavailable` (the three cases are intentionally indistinguishable
        so the table cannot be probed).
      tags: [agent]
      security:
        - AgentSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutologinConsumeRequest"
      responses:
        "200":
          description: Nonce consumed; agent may now establish the wp-admin session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutologinConsumeResponse"
        "401":
          description: Agent authentication failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: |
            The body's `site_id` does not match the agent's verified identity
            (`site_mismatch`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "410":
          description: |
            Nonce is unknown, already consumed, or expired (`nonce_unavailable`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /agent/v1/metadata:
    post:
      operationId: agentMetadata
      summary: Push site metadata (agent-authenticated)
      description: |
        Authenticated via the Ed25519 signed-request scheme (see the AgentSignature
        security scheme). The site + tenant are resolved from the verified agent
        identity, never from a header. Updates last_seen_at and marks the site
        healthy.
      tags: [agent]
      security:
        - AgentSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentMetadata"
      responses:
        "200":
          description: Metadata stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Site"
        "401":
          description: Agent authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /agent/v1/heartbeat:
    post:
      operationId: agentHeartbeat
      summary: Liveness heartbeat (agent-authenticated)
      description: |
        The 60s agent heartbeat (ADR-039). Authenticated via the Ed25519
        signed-request scheme; refreshes last_seen_at for the resolved site,
        recovers a degraded/disconnected site to `connected`, and returns any
        pending agent instructions (e.g. `["revoke"]` for a revoked site). The
        body may carry light metadata (status, versions, pending-update count);
        it is accepted best-effort. Pre-M21 control planes return 204 with no
        body.
      tags: [agent]
      security:
        - AgentSignature: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentHeartbeat"
      responses:
        "200":
          description: Heartbeat recorded; optional pending instructions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentHeartbeatResult"
        "204":
          description: Heartbeat recorded (legacy liveness-only path)
        "401":
          description: Agent authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /agent/v1/disconnect:
    post:
      operationId: agentDisconnect
      summary: Signed last-will disconnect (agent-authenticated)
      description: |
        M21 / ADR-040 — the agent's signed last-will. Fired by the WordPress
        deactivation/uninstall hooks (best-effort, 3s timeout). Authenticated via
        the SAME Ed25519 signed-request scheme as every agent route: the
        signature is verified and bound to the calling site BEFORE any write, so
        possession of a site_id alone cannot disconnect a site. Transitions the
        site connected/degraded → `disconnected` with the supplied reason. Does
        NOT archive (archive stays an explicit operator action).
      tags: [agent]
      security:
        - AgentSignature: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentDisconnect"
      responses:
        "200":
          description: Disconnect recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "401":
          description: Agent authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /agent/v1/media/sync-batch:
    post:
      operationId: agentMediaSyncBatch
      summary: Push a page of enumerated media attachments (agent-authenticated)
      description: |
        Media Optimizer (ADR-043) — the agent's `media_sync` command pushes pages
        of ≤200 attachments here. Authenticated via the Ed25519 signed-request
        scheme; the tenant+site come from the verified identity, never a header.
      tags: [agent, media]
      security:
        - AgentSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentMediaSyncBatch"
      responses:
        "200":
          description: Batch upserted
          content:
            application/json:
              schema:
                type: object
                properties:
                  upserted_count: { type: integer }
        "401":
          description: Agent authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /agent/v1/media/presign:
    post:
      operationId: agentMediaPresign
      summary: Request presigned PUT URLs for source variants (agent-authenticated)
      description: |
        Media Optimizer (ADR-043) — the agent's `media_optimize` command requests
        presigned PUT URLs (one per variant, ≤10) so it can upload source bytes to
        media/<tenant>/<site>/<job>/src/<name>. No image bytes pass through the CP.
      tags: [agent, media]
      security:
        - AgentSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentMediaPresign"
      responses:
        "200":
          description: Presigned upload URLs keyed by variant name
          content:
            application/json:
              schema:
                type: object
                properties:
                  uploads:
                    type: object
                    additionalProperties: { type: string }
        "401":
          description: Agent authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /agent/v1/media/encode-ready:
    post:
      operationId: agentMediaEncodeReady
      summary: Signal that source variants are uploaded (agent-authenticated)
      description: |
        Media Optimizer (ADR-043) — the agent calls this after presigned-PUTting
        the source variants so the CP enqueues the encode jobs.
      tags: [agent, media]
      security:
        - AgentSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentMediaPresign"
      responses:
        "200":
          description: Encode-ready acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        "401":
          description: Agent authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /agent/v1/media/job-status:
    post:
      operationId: agentMediaJobStatus
      summary: Report an apply (or delete-originals) result (agent-authenticated)
      description: |
        Media Optimizer (ADR-043) — after `media_apply` or `media_delete_originals`,
        the agent reports the applied variants, byte sizes, compression level,
        target format, and DB-rewrite row counts so the CP can upsert the mirror
        row (site_media_assets).
      tags: [agent, media]
      security:
        - AgentSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentMediaJobStatus"
      responses:
        "200":
          description: Status recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        "401":
          description: Agent authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /agent/v1/media/restore-status:
    post:
      operationId: agentMediaRestoreStatus
      summary: Report a restore result (agent-authenticated)
      description: |
        Media Optimizer (ADR-043) — after `media_restore`, the agent reports
        whether the attachment was reverted to its pre-optimization state.
      tags: [agent, media]
      security:
        - AgentSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentMediaRestoreStatus"
      responses:
        "200":
          description: Restore status recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        "401":
          description: Agent authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /agent/v1/media/asset-deleted:
    post:
      operationId: agentMediaAssetDeleted
      summary: Report a WP attachment was deleted (agent-authenticated)
      description: |
        Media Optimizer (ADR-043) — the agent's `delete_attachment` hook fired on
        any deletion path (wp-admin, programmatic, WP-CLI, REST). The agent has
        already removed its own untracked originals from disk; this notifies the
        CP to reconcile the site_media_assets row. Best-effort from the agent;
        the periodic sync sweep is the backstop.
      tags: [agent, media]
      security:
        - AgentSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentMediaAssetDeleted"
      responses:
        "200":
          description: Asset deletion recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        "401":
          description: Agent authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /agent/v1/media/sync-finalize:
    post:
      operationId: agentMediaSyncFinalize
      summary: Finalize a clean media enumeration (agent-authenticated)
      description: |
        Media Optimizer (ADR-043) — the agent calls this once a FULL paged media
        enumeration completed cleanly (every sync-batch page succeeded) so the CP
        reconciles offline deletions (marks any site_media_assets row not seen in
        this job's pages as deleted). NEVER sent on a partial/errored run — the
        blast-radius guard against a transiently-empty WP wiping the asset list.
      tags: [agent, media]
      security:
        - AgentSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentMediaSyncFinalize"
      responses:
        "200":
          description: Enumeration finalized; offline deletions reconciled
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        "401":
          description: Agent authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /agent/v1/fonts/transcode:
    post:
      operationId: agentFontsTranscode
      summary: Enqueue or poll a font WOFF2 transcode job (agent-authenticated)
      description: |
        Font Transcoder (M54 / Phase 1) — the agent POSTs when it discovers a
        self-hosted font (TTF/OTF/WOFF) that needs a WOFF2 encoding so it can
        serve the font with correct `format()` fallbacks.

        **Upload flow:**
        1. Agent POSTs `FontTranscodeRequest` (no storage key — the agent MUST
           NOT supply or guess a key; the CP derives all keys from the verified
           tenant identity + `source_hash`).
        2. If no job exists yet, the CP enqueues a `font_transcode` River job
           and returns `state="pending"` with a `source_put_url` (presigned
           S3 PUT, same TTL as the source-upload URL for media). The agent
           MUST PUT the raw font bytes to this URL before the encoder runs.
        3. On subsequent POSTs for the same hash (`state="pending"` row
           already exists), `source_put_url` is absent — the source is already
           uploaded. The agent polls on every page build until state changes.
        4. When `state="ready"`, `woff2_get_url` is a short-TTL presigned GET
           URL minted by the CP for the server-derived, GuardStorageKey-
           validated WOFF2 object. The agent fetches the WOFF2 bytes from this
           URL. The agent MUST NOT presign or construct a storage key itself.
           `woff2_key` is also present as an informational field.
        5. When `state="negative"`, transcoding permanently failed; the agent
           serves the original font forever (no retry).

        **Security:** keys are SERVER-DERIVED from the verified tenant identity
        + the caller-validated `source_hash`; `GuardStorageKey` validates every
        key before it reaches the presigner. The agent identity (Ed25519
        signed-request middleware) drives the tenant scope — the body never
        influences which tenant's namespace is used.
      tags: [agent, perf]
      security:
        - AgentSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FontTranscodeRequest"
      responses:
        "200":
          description: Current transcode state for this hash
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FontTranscodeResponse"
        "400":
          description: Invalid request (source_size <= 0)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Agent authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: source_hash is not a valid 64-char lowercase hex BLAKE3 digest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Daily per-tenant font transcode enqueue cap exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Font transcode enqueuer not available (degraded deployment)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /agent/v1/fonts/results:
    post:
      operationId: agentFontsResults
      summary: Push font processing results (agent-authenticated)
      description: |
        Font Results Catalog (M55 / Phase 2) — the agent POSTs after
        transcoding or subsetting completes (or permanently fails) for one or
        more self-hosted fonts. The CP upserts the font_results catalog row for
        each item and derives savings_pct from the reported sizes.

        **Security:** tenant_id + site_id ALWAYS come from the VERIFIED agent
        identity (Ed25519 signed-request middleware), NEVER from the body.
        source_hash items that are not valid 64-char lowercase hex BLAKE3
        digests are skipped (not rejected) so a bad item never blocks the batch.

        **Response:** `{"ok": true, "stored": N, "skipped": M}` where N is the
        count of successfully upserted rows and M is the count of skipped items
        (invalid hash or transient DB error).
      tags: [agent, perf]
      security:
        - AgentSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentFontResultsRequest"
      responses:
        "200":
          description: Results stored (partially or fully)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentFontResultsResponse"
        "400":
          description: Invalid body or empty results array
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Agent authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/sites/{siteId}:
    get:
      operationId: getSite
      summary: Get a site by ID
      tags: [sites]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      responses:
        "200":
          description: The site
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Site"
        "404":
          description: Site not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteSite
      summary: Delete a site
      tags: [sites]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      responses:
        "204":
          description: Site deleted
        "404":
          description: Site not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/updates:
    post:
      operationId: createUpdateRun
      summary: Start a bulk update run
      description: |
        Creates an update run targeting a selection of sites (by site_ids OR by
        tag) and a set of items (plugins/themes/core, each with a desired version
        or "latest"). One task is created per (site, item) and a background job is
        enqueued per task (respecting a per-tenant parallelism limit). When
        dry_run is true the agent is asked what WOULD change and the site is not
        mutated. Requires operator+.
      tags: [updates]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRunCreate"
      responses:
        "201":
          description: Update run created (tasks enqueued)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateRun"
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      operationId: listUpdateRuns
      summary: List update runs for the current tenant
      tags: [updates]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: A page of update runs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateRunList"
  /api/v1/updates/{runId}:
    get:
      operationId: getUpdateRun
      summary: Get an update run with its tasks
      tags: [updates]
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: The update run and its per-(site,item) tasks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateRun"
        "404":
          description: Update run not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/updates/{runId}/events:
    get:
      operationId: streamUpdateRunEvents
      summary: Stream live update-task status changes (SSE)
      description: |
        Server-Sent Events stream (text/event-stream) of task status transitions
        for a run, for live progress. Each `data:` line is a JSON UpdateEvent.
        The stream emits periodic heartbeat comment lines (":\n") and ends when
        the run reaches a terminal state or the client disconnects. Requires
        viewer+.
      tags: [updates]
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: |
            An event stream. Media type text/event-stream; each event payload is
            an UpdateEvent JSON object. Documented here as the UpdateEvent schema
            for clients/codegen even though the transport is SSE, not JSON.
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/UpdateEvent"
        "404":
          description: Update run not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/sites/{siteId}/backups:
    post:
      operationId: createBackup
      summary: Start a backup of a site
      description: |
        Records a pending backup snapshot for the site and enqueues a background
        job that dispatches a signed `backup` command to the site's agent. The
        agent chunks, encrypts (client-side, age, to the site's PUBLIC recipient)
        and uploads ciphertext directly to object storage via presigned URLs,
        then submits the manifest. Incremental: a chunk whose content hash is
        already stored is not re-uploaded. Requires operator+.
      tags: [backups]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BackupCreate"
      responses:
        "201":
          description: Backup snapshot created (job enqueued)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupSnapshot"
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      operationId: listBackups
      summary: List a site's backup snapshots
      tags: [backups]
      parameters:
        - $ref: "#/components/parameters/SiteId"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: A page of backup snapshots
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupSnapshotList"
  /api/v1/backups/{snapshotId}:
    get:
      operationId: getBackup
      summary: Get a backup snapshot with its manifest summary
      tags: [backups]
      parameters:
        - $ref: "#/components/parameters/SnapshotId"
      responses:
        "200":
          description: The backup snapshot and its manifest entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupSnapshotDetail"
        "404":
          description: Snapshot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteBackup
      summary: Delete a terminal backup snapshot (chain-safe)
      description: |
        Deletes a completed or failed snapshot and reclaims any now-unreferenced
        chunks via the reachability-based retention GC over the surviving
        snapshots — a chunk a surviving snapshot still needs is never deleted.
        CHAIN-SAFE: deleting a base or mid-chain increment that still has
        dependent later-generation increments is refused with 422
        (chain_has_dependents); delete the newer increments first. A
        running/pending snapshot is refused with 422 (snapshot_in_progress) —
        cancel it first. Requires operator+.
      tags: [backups]
      parameters:
        - $ref: "#/components/parameters/SnapshotId"
      responses:
        "204":
          description: The snapshot was deleted
        "404":
          description: Snapshot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: |
            The snapshot cannot be deleted yet — it has dependent increments
            (chain_has_dependents) or is still running (snapshot_in_progress).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/backups/{snapshotId}/cancel:
    post:
      operationId: cancelBackup
      summary: Cancel a running or pending backup snapshot
      description: |
        Stops an in-flight backup by marking the snapshot failed
        ("cancelled by operator"). After cancel the snapshot is deletable and a
        late agent manifest submit is rejected. A snapshot that is already
        terminal (completed/failed) is refused with 409 (snapshot_not_cancelable).
        Requires operator+.
      tags: [backups]
      parameters:
        - $ref: "#/components/parameters/SnapshotId"
      responses:
        "200":
          description: The snapshot was cancelled (now status=failed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupSnapshot"
        "404":
          description: Snapshot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: The snapshot is not running and cannot be cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/backups/{snapshotId}/lock:
    patch:
      operationId: lockBackup
      summary: Lock a backup snapshot against retention GC
      description: |
        Sets `locked=true` on a completed snapshot. Locked snapshots are never
        auto-pruned by the retention GC regardless of age or count rules.
        The operator must explicitly DELETE the lock before the GC can reclaim it.
        Track C (m49). Requires operator+.
      tags: [backups]
      parameters:
        - $ref: "#/components/parameters/SnapshotId"
      responses:
        "200":
          description: Snapshot is now locked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupSnapshot"
        "404":
          description: Snapshot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Cannot lock a pending or running snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: unlockBackup
      summary: Unlock a backup snapshot (re-enable GC eligibility)
      description: |
        Clears the `locked` flag, making the snapshot eligible for normal
        retention GC again. Track C (m49). Requires operator+.
      tags: [backups]
      parameters:
        - $ref: "#/components/parameters/SnapshotId"
      responses:
        "200":
          description: Snapshot is now unlocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupSnapshot"
        "404":
          description: Snapshot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/backups/{snapshotId}/events:
    get:
      operationId: streamBackupSnapshotEvents
      summary: Stream live backup snapshot progress (SSE)
      description: |
        Server-Sent Events stream (text/event-stream) of progress transitions for
        a backup snapshot, for live UI updates. Each frame is tagged
        `event: progress` with a JSON BackupEvent payload. The stream emits
        periodic heartbeat comment lines (":\n\n") every 15 seconds and has a
        30-minute server-side safety timeout. The server does NOT close the
        stream on a terminal snapshot status — a completed snapshot can still
        receive restore phase events on the same channel. The client is
        responsible for closing its EventSource when it observes a terminal
        `phase` (completed/failed). Requires viewer+.
      tags: [backups]
      parameters:
        - $ref: "#/components/parameters/SnapshotId"
      responses:
        "200":
          description: |
            An event stream. Media type text/event-stream; each event payload is
            a BackupEvent JSON object. Documented here as the BackupEvent schema
            for clients/codegen even though the transport is SSE, not JSON.
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/BackupEvent"
        "404":
          description: Backup snapshot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/backups/{snapshotId}/environment:
    get:
      operationId: getBackupEnvironment
      summary: Get the environment fingerprint recorded at backup time
      description: |
        Returns the raw JSON the agent shipped as the synthetic `environment.json`
        manifest entry for a snapshot (PHP version, WordPress version, active
        plugins, server software, etc.). Returns 404 with code `env_not_recorded`
        for snapshots that pre-date the environment-fingerprint feature (agent
        v0.9.10+). Returns 503 when the environment reader is not wired on this
        control plane. Requires viewer+.
      tags: [backups]
      parameters:
        - $ref: "#/components/parameters/SnapshotId"
      responses:
        "200":
          description: The agent-produced environment fingerprint JSON (pass-through).
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "404":
          description: Snapshot not found, or snapshot pre-dates the environment-fingerprint feature (env_not_recorded).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Environment reader not configured on this control plane.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/backups/{snapshotId}/sql-inspection:
    get:
      operationId: getBackupSqlInspection
      summary: Inspect the SQL dump contained in a backup snapshot
      description: |
        Returns a structured report on the SQL dump artifact of a backup
        snapshot: table inventory, row/byte estimates, charset, table prefix,
        and (when the dump looks like a WordPress install) the canonical
        siteurl/home/db_version probed from wp_options. Resolution order:
        1. If the snapshot manifest carries an agent-generated inspection
           artifact, that JSON is returned (source="agent"). This is the cheap,
           always-correct path because the agent has the SQL plaintext locally.
        2. Otherwise the control plane streams the dump artifact, parses it
           with the legacy scanner, and caches the result for subsequent calls
           (source="cp-legacy"). The first request returns 202 Accepted while
           the inspection job runs; the client polls until it gets 200.
        Requires viewer+.
      tags: [backups]
      parameters:
        - $ref: "#/components/parameters/SnapshotId"
      responses:
        "200":
          description: The parsed SQL inspection report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SqlInspection"
        "202":
          description: |
            The legacy inspection job has been enqueued; the client should poll
            the same URL until the report is ready. The Location header echoes
            the polling URL for clients that follow it transparently.
          headers:
            Location:
              description: URL to poll for the ready report.
              schema:
                type: string
        "404":
          description: Snapshot not found, or has no DB artifact to inspect
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/backups/{snapshotId}/restore:
    post:
      operationId: createRestore
      summary: Restore from a backup snapshot (full or partial)
      description: |
        Enqueues a restore job. The control plane resolves the (possibly partial)
        selection into ordered chunks, issues presigned GET URLs, and dispatches
        a signed `restore` command. The agent downloads ciphertext, verifies the
        BLAKE3 of each chunk, decrypts with the age identity it alone holds, and
        reassembles. Supports full, by-path, and by-db-table partial restore.
        Requires operator+.
      tags: [backups]
      parameters:
        - $ref: "#/components/parameters/SnapshotId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RestoreCreate"
      responses:
        "202":
          description: Restore job enqueued
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/BackupSnapshot"
                  - type: object
                    properties:
                      restore_run_id:
                        type: string
                        format: uuid
                        description: >
                          The restore_run row ID created for this restore attempt.
                          Use it to correlate SSE progress events. Absent when the
                          restore-run store is not wired on this control plane.
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/sites/{siteId}/backup-schedule:
    get:
      operationId: getBackupSchedule
      summary: Get a site's backup schedule
      tags: [backups]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      responses:
        "200":
          description: The site's backup schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupSchedule"
        "404":
          description: No schedule configured for the site
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      operationId: putBackupSchedule
      summary: Create or update a site's backup schedule
      tags: [backups]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BackupScheduleUpdate"
      responses:
        "200":
          description: The saved backup schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupSchedule"
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/sites/{siteId}/backup-settings/contents:
    get:
      operationId: getBackupSettingsContents
      summary: Get a site's backup content scope settings (Track-A, m50)
      tags: [backups]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      responses:
        "200":
          description: The site's backup content scope settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteBackupSettingsContents"
        "404":
          description: No settings row exists (safe defaults apply)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      operationId: putBackupSettingsContents
      summary: Create or update a site's backup content scope settings
      tags: [backups]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteBackupSettingsContentsUpdate"
      responses:
        "200":
          description: The saved backup content scope settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteBackupSettingsContents"
        "422":
          description: Validation failed (invalid component, size cap, path/ext cap)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/sites/{siteId}/backup-settings/notifications:
    get:
      operationId: getBackupSettingsNotifications
      summary: Get a site's backup notification settings (Track-B, m50)
      tags: [backups]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      responses:
        "200":
          description: The site's backup notification settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteBackupSettingsNotifications"
        "404":
          description: No settings row exists (safe defaults apply — never/empty)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      operationId: putBackupSettingsNotifications
      summary: Create or update a site's backup notification settings
      tags: [backups]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteBackupSettingsNotificationsUpdate"
      responses:
        "200":
          description: The saved backup notification settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteBackupSettingsNotifications"
        "422":
          description: Validation failed (invalid enum, bad email, too many recipients)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/sites/{siteId}/restores:
    get:
      operationId: listRestoreRuns
      summary: List restore runs for a site
      description: |
        Returns restore runs for the site, ordered newest-first. Each run
        records a single restore attempt triggered via
        `POST /backups/{snapshotId}/restore`. The `triggered_by_email` and
        `triggered_by_name` fields are populated when the actor is a known
        user in the tenant directory (API-key or system actors leave them
        null). Requires viewer+.
      tags: [backups]
      parameters:
        - $ref: "#/components/parameters/SiteId"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: A list of restore runs for the site
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestoreRunList"
        "404":
          description: Site not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/restores/{restoreId}:
    get:
      operationId: getRestoreRun
      summary: Get a restore run by ID
      description: |
        Returns the restore run record by its UUID. Authorization is enforced
        by resolving the run's `site_id` and applying the caller's
        `PermSiteRead` grant on that site (the same by-id pattern as
        `GET /backups/{snapshotId}`). Requires viewer+.
      tags: [backups]
      parameters:
        - $ref: "#/components/parameters/RestoreId"
      responses:
        "200":
          description: The restore run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestoreRun"
        "403":
          description: The caller does not have access to the run's site
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Restore run not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/restores/{restoreId}/events:
    get:
      operationId: listRestoreRunEvents
      summary: List phase-log events for a restore run
      description: |
        Returns the ordered phase log for a restore run, ascending by event
        ID. Supports incremental polling via `?after=<id>`: pass the highest
        `id` from the previous response to receive only newer events.
        Authorization mirrors `GET /restores/{restoreId}` — the run's site
        is resolved and the caller's `PermSiteRead` is enforced on it.
        Requires viewer+.
      tags: [backups]
      parameters:
        - $ref: "#/components/parameters/RestoreId"
        - name: after
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 0
            default: 0
          description: |
            Return only events with `id > after`. Pass the last seen event
            `id` to poll incrementally. Omit (or pass 0) for the full log
            from the beginning.
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: A page of phase-log events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestoreRunEventList"
        "403":
          description: The caller does not have access to the run's site
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Restore run not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/sites/{siteId}/schedule-runs:
    get:
      operationId: listScheduleRuns
      summary: List schedule runs for a site
      description: |
        Returns a split view of schedule runs for the site: `upcoming`
        (non-terminal: scheduled/queued/running, bounded to 10) and `past`
        (terminal: completed/failed/skipped/canceled, paginated via
        `limit`/`offset`). Filter to one set with `?status=upcoming` or
        `?status=past`. Requires viewer+.
      tags: [backups]
      parameters:
        - $ref: "#/components/parameters/SiteId"
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [upcoming, past]
          description: |
            Filter the result set. `upcoming` returns only non-terminal runs
            (bounded to 10); `past` returns only terminal runs (paginated).
            Omit to receive both sets in a single response.
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Split schedule-run list (upcoming + past)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleRunList"
        "404":
          description: Site not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/schedule-runs/{runId}:
    get:
      operationId: getScheduleRun
      summary: Get a schedule run by ID
      description: |
        Returns the schedule run record by its UUID. Authorization is enforced
        by resolving the run's `site_id` and applying the caller's
        `PermSiteRead` grant on that site. Requires viewer+.
      tags: [backups]
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: The schedule run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleRun"
        "403":
          description: The caller does not have access to the run's site
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Schedule run not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/sites/{siteId}/updates/refresh:
    post:
      operationId: refreshSiteUpdates
      summary: Trigger an immediate inventory + available-updates refresh
      description: |
        Enqueues a CP->agent refresh-inventory command for the site. The agent
        re-reads its plugin/theme inventory and `update_*` transients and pushes
        them back over /agent/v1/metadata. Returns 202 immediately. Requires
        viewer+. Returns 409 when the site is offline or unreachable, or 404 if
        the site is not enrolled in this tenant.
      tags: [updates]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      responses:
        "202":
          description: Refresh queued
        "404":
          description: Site not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Site offline or refresh already in flight
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/sites/{siteId}/updates/available:
    get:
      operationId: getSiteAvailableUpdates
      summary: Get the cached per-item available-updates list for a site
      description: |
        Returns the cached list of plugins/themes (and core) that have an update
        available, derived from the agent's last metadata sync. Items are sorted
        core -> plugins -> themes, with active before inactive. `as_of` is the
        site's last update timestamp. Requires viewer+.
      tags: [updates]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      responses:
        "200":
          description: Available updates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteAvailableUpdates"
        "404":
          description: Site not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/sites/{siteId}/uptime:
    get:
      operationId: getSiteUptime
      summary: Get a site's uptime status over a window
      description: |
        Returns the uptime % and average latency for a site over the requested
        window (7d/30d/90d), the current up/down state, the last check time, the
        TLS certificate expiry, and a downsampled recent check series. Metrics
        come from the ClickHouse uptime store, scoped by tenant_id + site_id; the
        site's tenant ownership is verified in Postgres first (a foreign site is
        a 404). Requires viewer+.
      tags: [uptime]
      parameters:
        - $ref: "#/components/parameters/SiteId"
        - name: window
          in: query
          required: false
          schema:
            type: string
            enum: ["7d", "30d", "90d"]
            default: "7d"
      responses:
        "200":
          description: The site's uptime status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UptimeStatus"
        "404":
          description: Site not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/uptime/summary:
    get:
      operationId: getUptimeSummary
      summary: Current up/down status per site for the dashboard
      description: |
        Returns the current up/down status and last check for every site in the
        tenant (from the latest recorded probe). Requires viewer+.
      tags: [uptime]
      responses:
        "200":
          description: Per-site current uptime status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UptimeSummary"
  /api/v1/alert-config:
    get:
      operationId: getAlertConfig
      summary: Get the tenant's uptime alert configuration
      description: |
        Returns the tenant's downtime/recovery alert channel: email recipients,
        whether a webhook is configured, and the enabled flag. The webhook secret
        is never returned. Requires admin+.
      tags: [uptime]
      responses:
        "200":
          description: The tenant's alert configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertConfig"
    put:
      operationId: putAlertConfig
      summary: Create or update the tenant's uptime alert configuration
      description: |
        Sets the email recipients, webhook URL + signing secret, and enabled flag
        for downtime/recovery alerts. The webhook secret is write-only. Requires
        admin+.
      tags: [uptime]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertConfigUpdate"
      responses:
        "200":
          description: The saved alert configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertConfig"
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  # ── ADR-037 Sprint 2 — Site Health (diagnostics) + PHP error monitor ────────
  /api/v1/sites/{siteId}/diagnostics:
    get:
      operationId: getSiteDiagnostics
      summary: Latest site diagnostics by category
      description: |
        Returns one card per category (14 total) carrying the latest payload
        the agent shipped + the collection/freshness timestamps. Categories the
        agent has never reported for are returned with a null payload so the UI
        can render an "awaiting first sync" placeholder.
      tags: [diagnostics]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      responses:
        "200":
          description: Site diagnostics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteDiagnosticsList"
        "404":
          description: Site not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/sites/{siteId}/diagnostics/refresh:
    post:
      operationId: refreshSiteDiagnostics
      summary: Enqueue an on-demand diagnostics command to the agent
      description: |
        Enqueues a signed `diagnostics` command to the agent. The agent runs
        the 14-category collector immediately and pushes the result back to
        POST /agent/v1/diagnostics. Returns 202 on accept. Returns 503 with
        code `diagnostics_refresh_unwired` when the CP->agent commander has
        not yet been wired (V1).
      tags: [diagnostics]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      responses:
        "202":
          description: Refresh enqueued
        "503":
          description: Refresh is not yet wired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/sites/{siteId}/errors:
    get:
      operationId: listSitePHPErrors
      summary: List fingerprint-grouped PHP errors for a site
      description: |
        Returns the agent-captured PHP errors for the site, grouped by md5
        fingerprint. Each row carries the occurrence count, first/last seen
        timestamps, and the silenced flag.
      tags: [diagnostics]
      parameters:
        - $ref: "#/components/parameters/SiteId"
        - name: since
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Only rows whose last_seen_at is after this timestamp.
        - name: silenced
          in: query
          required: false
          schema:
            type: string
            enum: ["true", "false"]
          description: Filter by silenced state. Omit for both.
        - $ref: "#/components/parameters/Limit"
        - { name: cursor, in: query, schema: { type: string } }
      responses:
        "200":
          description: PHP error list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PHPErrorList"
  /api/v1/sites/{siteId}/errors/{md5}/silence:
    post:
      operationId: silenceSitePHPError
      summary: Silence (or unsilence) a fingerprint-grouped PHP error
      description: |
        Toggles the silenced flag on a (site, md5) error row. The agent
        continues to count silently on its side; the CP UI hides silenced
        rows by default.
      tags: [diagnostics]
      parameters:
        - $ref: "#/components/parameters/SiteId"
        - name: md5
          in: path
          required: true
          schema:
            type: string
          description: The md5 fingerprint.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PHPErrorSilence"
      responses:
        "204":
          description: Silence flag updated
        "404":
          description: Error not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  # ── S1.2 PHP-error ignore-list + error-level config ─────────────────────────
  /api/v1/sites/{siteId}/errors/config:
    get:
      operationId: getSiteErrorConfig
      summary: Get the per-site PHP error reporting config
      description: |
        Returns the site's PHP error-level mask and md5 ignore-list. When no
        config row has been saved yet the defaults are returned: error_level=6143
        (WordPress default E_ALL & ~E_STRICT) and an empty ignore_md5s list.
        The config is pushed to the agent on each PATCH; this GET only reads
        the CP-side stored value.
      tags: [diagnostics]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      responses:
        "200":
          description: Error config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteErrorConfig"
        "404":
          description: Site not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: patchSiteErrorConfig
      summary: Save per-site PHP error reporting config and push to agent
      description: |
        Stores the PHP error-level mask and md5 ignore-list for the site, then
        pushes the new config to the agent via a signed `sync_error_config`
        command. Returns the stored config on success.

        Validation:
          - `error_level` must be a positive integer that fits in int32 (>0,
            ≤2147483647). Typical values: 6143 (WP default), 32767 (E_ALL),
            0x7FFFFFFF (all flags set).
          - Each entry in `ignore_md5s` must be exactly 32 lowercase hex
            characters (the md5(code:file:line:message) fingerprint produced
            by the agent).

        If the agent push fails after the config is successfully stored the
        response is still HTTP 200 with the stored config; an
        `X-Agent-Push-Warning` response header carries the push error message
        so the UI can surface it as a non-blocking warning.
      tags: [diagnostics]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteErrorConfigUpdate"
      responses:
        "200":
          description: Config stored (and pushed to agent unless the push failed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteErrorConfig"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Site not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  # ── ADR-037 Sprint 3 — WordPress activity log (tamper-evident) ──────────────
  /api/v1/sites/{siteId}/activity:
    get:
      operationId: listSiteActivity
      summary: List WordPress activity-log events for a site
      description: |
        Returns the agent-captured WordPress activity events for the site,
        newest first. Each event carries the hash-chain fields (prev_hash,
        this_hash) and a server-verified chain_valid flag: the CP recomputes
        every event's hash at ingest and flags any tamper (a mutated, inserted,
        or deleted historical row) as chain_valid=false. Filter by event_type,
        object_type, actor_login, severity, and an occurred-at time range.
      tags: [activity]
      parameters:
        - $ref: "#/components/parameters/SiteId"
        - name: event_type
          in: query
          required: false
          schema: { type: string }
          description: Exact-match filter on the event type.
        - name: object_type
          in: query
          required: false
          schema: { type: string }
          description: Exact-match filter on the object type.
        - name: actor_login
          in: query
          required: false
          schema: { type: string }
          description: Exact-match filter on the actor login.
        - name: severity
          in: query
          required: false
          schema:
            type: string
            enum: [high, medium, low]
          description: Filter by severity.
        - name: since
          in: query
          required: false
          schema: { type: string, format: date-time }
          description: Only events whose occurred_at is at/after this timestamp.
        - name: until
          in: query
          required: false
          schema: { type: string, format: date-time }
          description: Only events whose occurred_at is at/before this timestamp.
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - { name: cursor, in: query, schema: { type: string } }
      responses:
        "200":
          description: Activity event list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteActivityList"
  /api/v1/sites/{siteId}/activity/verify:
    get:
      operationId: verifySiteActivity
      summary: Re-verify the activity-log hash chain for a site
      description: |
        Recomputes the entire hash chain for the site server-side from genesis
        and reports whether it is intact. When a break is found, break_at_seq
        carries the seq of the first event whose recomputed hash (or prev_hash
        linkage) does not match — the tamper point. This is the integrity badge
        feeding the activity view.
      tags: [activity]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      responses:
        "200":
          description: Chain verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityVerifyResult"
  # ── S2 — Login Protection + IP store ───────────────────────────────────────
  /api/v1/sites/{siteId}/security/login-protection:
    get:
      operationId: getSiteLoginProtection
      summary: Get the login-protection config for a site
      description: |
        Returns the current login-protection mode, brute-force thresholds, IP
        header selection, and CIDR allow/deny lists for the site. When no config
        has been saved yet, returns the built-in defaults (mode=protect, standard
        thresholds, REMOTE_ADDR, empty CIDR lists).
      tags: [security]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      responses:
        "200":
          description: Current login-protection config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteLoginProtectionConfig"
    put:
      operationId: putSiteLoginProtection
      summary: Save (and push to agent) the login-protection config
      description: |
        Stores the new config and pushes it to the agent via the signed
        `sync_security_config` command. If the agent push fails after a
        successful store, HTTP 200 is still returned with the stored config;
        the push error is surfaced in the `X-Agent-Push-Warning` response
        header so callers can surface it as a non-blocking warning.

        **Safety rail**: when `mode` is `"protect"` and `allow_cidrs` is empty,
        the CP automatically adds the requesting operator's client IP (/32 for
        IPv4, /128 for IPv6) to `allow_cidrs` before storing. This prevents the
        operator from enabling protection and immediately locking themselves out.
        The auto-added CIDR is reflected in the returned config.
      tags: [security]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteLoginProtectionConfigUpdate"
      responses:
        "200":
          description: Stored login-protection config (including any auto-added operator CIDR)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteLoginProtectionConfig"
        "422":
          description: Validation error (invalid mode, CIDR, or thresholds)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/sites/{siteId}/security/unblock-ip:
    post:
      operationId: unblockSiteIP
      summary: Unblock an IP address on the site
      description: |
        Sends the signed `unblock_ip` command to the site's agent, removing any
        active block for the given IP. Returns `ok=true` on success; `ok=false`
        with a `detail` message when the agent rejects or cannot apply the
        unblock (still HTTP 200 — it is an application-level, not transport, failure).
      tags: [security]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnblockIPRequest"
      responses:
        "200":
          description: Unblock result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnblockIPResult"
        "422":
          description: Validation error (invalid IP address)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Security agent client not wired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/sites/{siteId}/security/login-events:
    get:
      operationId: listSiteLoginEvents
      summary: List login events for a site
      description: |
        Returns the agent-ingested login events for the site, ordered by
        `occurred_at` descending (newest first). Filter by `status` (1=failure,
        2=success, 3=blocked). Default limit is 100; max 500.
      tags: [security]
      parameters:
        - $ref: "#/components/parameters/SiteId"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 500
            default: 100
          description: Maximum number of events to return.
        - name: status
          in: query
          required: false
          schema:
            type: integer
            format: int32
            enum: [1, 2, 3]
          description: |
            Filter by login-event status: 1=failure, 2=success, 3=blocked.
            Omit to return all statuses.
      responses:
        "200":
          description: Login event list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteLoginEventList"
  # ── M14 Login Whitelabel ────────────────────────────────────────────────────
  /api/v1/sites/{siteId}/login-brand:
    get:
      operationId: getSiteLoginBrand
      summary: Get the login brand config for a site
      description: |
        Returns the current login brand config (logo URL, logo link, message)
        for the site. When no config has been saved yet, returns the all-empty
        default (all string fields are `""`), which the agent interprets as
        "no override" (WordPress built-in login logo / no custom message).
      tags: [loginbrand]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      responses:
        "200":
          description: Current login brand config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteLoginBrand"
    put:
      operationId: putSiteLoginBrand
      summary: Save (and push to agent) the login brand config
      description: |
        Stores the new login brand config and pushes it to the agent via the
        signed `sync_login_brand` command. If the agent push fails after a
        successful store, HTTP 200 is still returned with the stored config;
        the push error is surfaced in the `X-Agent-Push-Warning` response
        header so callers can surface it as a non-blocking warning.

        **Validation**:
          - `logo_url` and `logo_link` must be empty (`""`) or a valid
            `http`/`https` URL (other schemes are rejected with 422).
          - `message` must be at most 2000 characters.
          - All fields are optional; omitted or `""` fields mean "no override".
      tags: [loginbrand]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteLoginBrandUpdate"
      responses:
        "200":
          description: Stored login brand config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteLoginBrand"
        "422":
          description: Validation error (invalid URL scheme or message too long)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # --- Performance Suite (ADR-046 / m36) --------------------------------------
  # Operator-facing dashboard routes. Auth is the cookie session + per-site
  # collaborator gate + per-route RBAC, applied by the hand-rolled Gin handler
  # (apps/api/internal/perf/handler.go); the ogen-generated server interface for
  # these operations is intentionally unused (ogen's router is never mounted in
  # this codebase — see internal/server/server.go). These paths exist so the
  # hey-api TS client (@wpmgr/api) is generated for them, ending the
  # path/shape drift between the dashboard and the backend.
  /api/v1/sites/{siteId}/perf/config:
    get:
      operationId: getPerfConfig
      summary: Get the Performance Suite config for a site
      description: |
        Returns the full per-site performance config. CDN credentials are
        WRITE-ONLY and are never returned; `cdn_has_credentials` is the
        read-only "a credential is set" flag. The `server_software`,
        `dropin_installed`, `wp_cache_constant_set`, and `htaccess_managed`
        fields are agent-reported install state.
        Requires the `site.perf.config` permission.
      tags: [performance]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      responses:
        "200":
          description: Current performance config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PerfConfig"
    put:
      operationId: putPerfConfig
      summary: Save (and push to agent) the Performance Suite config
      description: |
        Stores the new performance config and pushes it to the agent. If the
        agent push fails after a successful store, HTTP 200 is still returned
        with the stored config and the push error is surfaced in the
        `X-Agent-Push-Warning` response header. `cdn_credentials`, when present,
        is encrypted server-side and never echoed back. Requires the
        `site.perf.config` permission.
      tags: [performance]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PerfConfig"
      responses:
        "200":
          description: Stored performance config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PerfConfig"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/sites/{siteId}/perf/cache/stats:
    get:
      operationId: getCacheStats
      summary: Get the latest cache gauges for a site
      description: |
        Returns the most recent cache gauges the agent reported (cached page
        count, on-disk cache size, last purge/preload timestamps, preload
        progress). Requires the `site:read` permission.
      tags: [performance]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      responses:
        "200":
          description: Latest cache gauges
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CacheStats"
  /api/v1/sites/{siteId}/perf/cache/purge:
    post:
      operationId: purgeCache
      summary: Purge the page cache for a site
      description: |
        Purges the whole cache (`scope: all`), a single URL (`scope: url` with
        `url`), or a list of URLs (`urls`). Setting `delete_everything: true`
        with `scope: all` additionally clears every cached artifact and requires
        the higher `site.cache.delete-everything` permission. The normal purge
        requires `site.cache.purge`. An agent rejection is returned as HTTP 200
        with `ok: false` and a `detail`.
      tags: [performance]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurgeRequest"
      responses:
        "200":
          description: Purge acknowledged (ok may be false on agent rejection)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PerfActionResult"
        "403":
          description: delete-everything requires the cache delete-all permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/sites/{siteId}/perf/cache/preload:
    post:
      operationId: preloadCache
      summary: Start the cache preload pass for a site
      description: |
        Triggers the agent to begin warming the page cache. Returns an
        `{ok, detail}` ack; preload progress lands via the `cache.preload.*`
        SSE events. Requires the `site.cache.purge` permission.
      tags: [performance]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      responses:
        "200":
          description: Preload acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PerfActionResult"
  /api/v1/sites/{siteId}/perf/cache/enable:
    post:
      operationId: enableCache
      summary: Enable page caching at the server for a site
      description: |
        Turns on agent-side page caching. Returns an `{ok, detail}` ack;
        the authoritative install state re-reads via the config query on the
        `cache.enabled` SSE event. Requires the `site.cache.manage` permission.
      tags: [performance]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      responses:
        "200":
          description: Enable acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PerfActionResult"
  /api/v1/sites/{siteId}/perf/cache/disable:
    post:
      operationId: disableCache
      summary: Disable page caching at the server for a site
      description: |
        Turns off agent-side page caching. Returns an `{ok, detail}` ack.
        Requires the `site.cache.manage` permission.
      tags: [performance]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      responses:
        "200":
          description: Disable acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PerfActionResult"
  /api/v1/sites/{siteId}/perf/db/scan:
    post:
      operationId: triggerDbScan
      summary: Trigger a synchronous read-only database scan for a site
      description: |
        Runs a synchronous read-only scan against the site's WordPress database
        via the agent. Returns the job_id. The full result (categories + per-table
        inventory) is pushed via the `db.scan.completed` SSE event and persisted
        for retrieval via the GET endpoint. Requires the `site.cache.manage`
        permission.
      tags: [performance]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                categories:
                  type: array
                  items: { type: string }
                  description: Subset of categories to scan; empty means all 14.
      responses:
        "200":
          description: Scan triggered
          content:
            application/json:
              schema:
                type: object
                required: [ok, job_id]
                properties:
                  ok: { type: boolean }
                  job_id: { type: string }
                  detail: { type: string }
    get:
      operationId: getDbScanResult
      summary: Get the latest stored database scan result for a site
      description: |
        Returns the most recently persisted db_scan result including the
        per-category counts and the full per-table inventory (Phase 2.1).
        Returns `{"result": null}` when no scan has been run yet.
        Requires the `site:read` permission.
      tags: [performance]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      responses:
        "200":
          description: Latest scan result (null when none)
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    nullable: true
                    $ref: "#/components/schemas/DbScanResult"
  /api/v1/sites/{siteId}/perf/db/search-replace:
    post:
      operationId: runSearchReplace
      summary: Run a serialization-safe database search-replace for a site
      description: |
        Dispatches a serialization-safe search-replace command to the site's
        agent. The command handles PHP-serialized blobs correctly by
        unserializing, walking the data structure, replacing only string leaves,
        and re-serializing (so `s:NN:` length prefixes are always recomputed).

        **Always call with `dry_run: true` first** to get a preview of how many
        rows would change before committing. The UI enforces this flow.

        When `dry_run: false` and no recent backup is found, the response
        includes an `X-Backup-Warning` header.

        Requires the `site:write` permission (operator+).
      tags: [performance]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchReplaceRequest"
      responses:
        "200":
          description: Search-replace result (or dry-run preview)
          headers:
            X-Backup-Warning:
              description: >
                Present on a live run (`dry_run: false`) when no recent backup
                was found. Non-blocking advisory only.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchReplaceResult"
  /api/v1/sites/{siteId}/perf/db/snapshots:
    get:
      operationId: listDbSnapshots
      summary: List local database snapshots for a site
      description: |
        Returns the manifest of local database snapshots stored on the WP server.
        Snapshots are a fast local safety-net (not encrypted off-site backups).
        Requires the `site:read` permission.
      tags: [performance]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      responses:
        "200":
          description: Snapshot manifest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DbSnapshotList"
    post:
      operationId: createDbSnapshot
      summary: Take a local database snapshot
      description: |
        Dumps the site's database to a local `.sql.gz` file on the WP server
        filesystem and records it in the snapshot manifest. This is a fast
        local safety-net — not an encrypted off-site backup.

        After the operation the oldest snapshots are pruned so the total count
        does not exceed the configured retention (default 5, max 20).

        Requires the `site:write` permission (operator+).
      tags: [performance]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DbSnapshotCreate"
      responses:
        "200":
          description: Snapshot created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DbSnapshotCreateResult"
  /api/v1/sites/{siteId}/perf/db/snapshots/{snapshotId}/revert:
    post:
      operationId: revertDbSnapshot
      summary: Revert the database to a local snapshot (DESTRUCTIVE)
      description: |
        Replaces the entire live database with the SQL captured in a local
        snapshot. **This is irreversible without another backup.**

        An automatic safety snapshot is taken immediately before the import
        so the pre-revert state is preserved locally (returned as `safety_id`).

        The `confirm` field in the request body MUST equal `"REVERT"` exactly.
        The agent enforces this independently — a request without the token is
        rejected.

        Requires the `site:write` permission (operator+).
      tags: [performance]
      parameters:
        - $ref: "#/components/parameters/SiteId"
        - name: snapshotId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DbSnapshotRevert"
      responses:
        "200":
          description: Database reverted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DbSnapshotRevertResult"
  /api/v1/sites/{siteId}/perf/db/snapshots/{snapshotId}:
    delete:
      operationId: deleteDbSnapshot
      summary: Delete a local database snapshot
      description: |
        Removes a snapshot from the WP server's local store. This is
        irreversible. Requires the `site:write` permission (operator+).
      tags: [performance]
      parameters:
        - $ref: "#/components/parameters/SiteId"
        - name: snapshotId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Snapshot deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  detail: { type: string }
  /api/v1/sites/{siteId}/perf/db/clean:
    post:
      operationId: cleanDatabase
      summary: Run the configured database cleanup now for a site
      description: |
        Runs the site's configured database cleanup (revisions, auto-drafts,
        trashed posts, spam/trashed comments, expired transients, table
        optimization) immediately. Returns an `{ok, detail, rows_cleaned}` ack.
        Requires the `site.cache.manage` permission.
      tags: [performance]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      responses:
        "200":
          description: Database cleanup acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DbCleanResult"
  /api/v1/sites/{siteId}/media/clean/scan:
    get:
      operationId: scanUnusedMedia
      summary: Scan a site's media library for unreferenced attachments
      description: |
        Dispatches a read-only scan to the site's agent. The agent walks the
        WordPress media library and checks every attachment against an exhaustive
        set of reference surfaces (post_content, postmeta, options, termmeta,
        usermeta, page-builder JSON blobs, ACF fields, WooCommerce galleries,
        nav menus, and more). Attachments for which no reference is found are
        returned as candidates.

        **Conservative rule**: when a check cannot run or the result is ambiguous
        the attachment is treated as referenced (safe). False negatives (calling a
        used image unused) are the dangerous failure; this implementation prefers
        false positives.

        Paginated by `offset`. Results are ordered by attachment ID ascending.
        Requires the `site.media.clean.scan` permission (viewer+).
      tags: [media]
      parameters:
        - $ref: "#/components/parameters/SiteId"
        - name: offset
          in: query
          required: false
          schema: { type: integer, minimum: 0, default: 0 }
          description: Pagination offset (attachment scan cursor).
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
          description: Maximum number of candidates to return per page.
      responses:
        "200":
          description: Scan page result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaCleanScanResult"
  /api/v1/sites/{siteId}/media/clean/isolate:
    post:
      operationId: isolateUnusedMedia
      summary: Move selected attachments to quarantine (reversible)
      description: |
        Instructs the agent to move the original file and all generated thumbnail
        sizes for the specified attachment IDs into the quarantine directory
        (`wp-content/wpmgr-quarantine/media/`). The attachment post rows are left
        intact so the Restore operation can undo the move cleanly.

        **This operation is reversible** — use the restore endpoint to undo.
        The attachment IDs must have appeared in a recent scan result.

        Requires the `site.media.clean.write` permission (operator+).
      tags: [media]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaCleanIsolateRequest"
      responses:
        "200":
          description: Isolate result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaCleanIsolateResult"
  /api/v1/sites/{siteId}/media/clean/restore:
    post:
      operationId: restoreIsolatedMedia
      summary: Restore quarantined attachments to their original locations
      description: |
        Moves quarantined attachment files back to the WordPress uploads directory
        using the quarantine manifest. The attachment posts are already intact.

        Requires the `site.media.clean.write` permission (operator+).
      tags: [media]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaCleanRestoreRequest"
      responses:
        "200":
          description: Restore result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaCleanRestoreResult"
  /api/v1/sites/{siteId}/media/clean/delete:
    post:
      operationId: deleteIsolatedMedia
      summary: Permanently delete quarantined attachments (IRREVERSIBLE)
      description: |
        Permanently removes quarantined attachment files from disk and deletes
        the corresponding WordPress attachment posts. **This cannot be undone.**

        Only items already in the quarantine directory (isolated via the isolate
        endpoint) can be deleted through this path. A `confirm` token of
        `"DELETE"` must be included in the request body; the agent enforces this
        independently.

        Requires the `site.media.clean.write` permission (operator+).
      tags: [media]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaCleanDeleteRequest"
      responses:
        "200":
          description: Delete result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaCleanDeleteResult"
  /api/v1/sites/{siteId}/media/clean/quarantine:
    get:
      operationId: listQuarantinedMedia
      summary: Returns all quarantine manifests currently held on the site (READ-ONLY).
      description: |
        Returns all quarantine manifests currently held on the site. Each manifest
        was created by a prior isolate call and describes the set of attachment
        files that were moved to the quarantine directory. This endpoint is
        read-only — it does not modify any files or attachment posts.

        Requires the `site.media.clean.scan` permission (viewer+).
      tags: [media]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      responses:
        "200":
          description: Quarantine manifest list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaCleanQuarantineList"

  # ---------------------------------------------------------------------------
  # m59 — Per-site Email / SMTP Management (Phase 0 + 1)
  # ---------------------------------------------------------------------------

  /api/v1/email/providers:
    get:
      operationId: listEmailProviders
      summary: List available email provider configurations
      description: |
        Returns the static v1 provider catalog: Generic SMTP, Amazon SES,
        SendGrid, Mailgun, and Postmark. Each entry includes the provider slug,
        display label, and the field schema (non-secret and secret fields, types,
        required flags, options).

        Org-level route — requires RequireOrgScope (org members only, not
        site-collaborators). Requires the `site.email.manage` permission.
      tags: [email]
      responses:
        "200":
          description: Provider catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailProviderCatalog"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/email/org-config:
    get:
      operationId: getOrgEmailConfig
      summary: Get the org-wide default email config
      description: |
        Returns the org-wide default email configuration. Sites with no per-site
        config inherit this row. Includes `secret_set: bool` — the actual
        provider secret is never returned.

        Org-level route. Requires `site.email.manage` permission (operator+).
      tags: [email]
      responses:
        "200":
          description: Org-wide email config (masked read)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteEmailConfig"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: No org-wide email config found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      operationId: putOrgEmailConfig
      summary: Create or update the org-wide default email config
      description: |
        Creates or updates the org-wide default email configuration. This row is
        inherited by any site that has no per-site override. Provide `secret` in
        the body to store a new provider secret (age-encrypted at rest); omit
        `secret` to preserve the existing stored credential.

        Org-level route. Requires `site.email.manage` permission (operator+).
      tags: [email]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PutEmailConfigRequest"
      responses:
        "200":
          description: Saved org-wide email config (masked read)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteEmailConfig"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Service unavailable (e.g. crypto not configured)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/sites/{siteId}/email/config:
    get:
      operationId: getSiteEmailConfig
      summary: Get per-site email config (with org-wide fallback)
      description: |
        Returns the email config for a site. If no per-site row exists the
        org-wide default is returned (with `site_id` set to the queried site so
        the frontend knows the row was inherited). Includes `secret_set: bool`;
        the actual provider secret is never returned.

        Requires `site.email.manage` permission (operator+) and site access.
      tags: [email]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      responses:
        "200":
          description: Site email config (masked read)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteEmailConfig"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Site not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      operationId: putSiteEmailConfig
      summary: Create or update per-site email config
      description: |
        Creates or updates the per-site email configuration. Provide `secret` in
        the body to store a new provider secret (age-encrypted at rest); omit
        `secret` to preserve the existing stored credential (nil-sentinel pattern).

        Requires `site.email.manage` permission (operator+) and site access.
      tags: [email]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PutEmailConfigRequest"
      responses:
        "200":
          description: Saved site email config (masked read)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteEmailConfig"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Service unavailable (e.g. crypto not configured)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/sites/{siteId}/email/webhook-config:
    put:
      operationId: putSiteEmailWebhookConfig
      summary: Update per-site email webhook settings
      description: |
        Updates the inbound webhook route token and/or signing key for the
        per-site email config. When rotate_token is true a new route token is
        generated (the old URL is immediately invalid) and the plain token is
        returned once in webhook_route_token.

        Requires `site.email.manage` permission (operator+) and site access.
      tags: [email]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PutEmailWebhookConfigRequest"
      responses:
        "200":
          description: Updated webhook config (masked read; token shown once on rotate)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailWebhookConfigResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Site or email config not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Service unavailable (e.g. crypto not configured)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/email/org-config/webhook-config:
    put:
      operationId: putOrgEmailWebhookConfig
      summary: Update org-wide email webhook settings
      description: |
        Updates the inbound webhook route token and/or signing key for the
        org-wide email config. When rotate_token is true a new route token is
        generated (the old URL is immediately invalid) and the plain token is
        returned once in webhook_route_token.

        Org-level route. Requires `site.email.manage` permission (operator+).
      tags: [email]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PutEmailWebhookConfigRequest"
      responses:
        "200":
          description: Updated webhook config (masked read; token shown once on rotate)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailWebhookConfigResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: No org-wide email config found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Service unavailable (e.g. crypto not configured)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/sites/{siteId}/email/test:
    post:
      operationId: sendTestEmail
      summary: Dispatch a test email via the site agent
      description: |
        Dispatches the signed `send_test_email` command to the site's agent.
        The agent uses its current email config (previously synced via
        sync_email_config) to send the test message.

        **Phase 1 note**: the agent does not yet implement this command (Phase 2
        will add the PHP handler). Until then the response will be
        `{ok: false, detail: "command not found"}`. This is expected and not an
        error state — wire the UI and handle the graceful failure.

        Requires `site.email.manage` permission (operator+) and site access.
      tags: [email]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailTestRequest"
      responses:
        "200":
          description: Test send result (ok may be false when agent returns error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailTestResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Site not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/sites/{siteId}/email/sync:
    post:
      operationId: syncSiteEmailConfig
      summary: Push the stored email config to the site agent
      description: |
        Dispatches the signed `sync_email_config` command so the agent has the
        current provider config and decrypted secret before the next send.

        Use this when the agent was offline at save time (the implicit sync on
        PUT /email/config was skipped), after rotating a secret, or when the
        operator explicitly wants to confirm the agent has the latest config.

        Unlike `sendTestEmail` there is no request body — the stored config is
        read from the CP and pushed as-is. The response is always 200; `ok`
        indicates whether the agent acknowledged the push.

        Requires `site.email.manage` permission (operator+) and site access.
      tags: [email]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      responses:
        "200":
          description: Sync result (ok may be false when the agent returns an error or is offline)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailTestResult"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Site not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # m59 Phase 3 — Email log viewer + stats
  # ---------------------------------------------------------------------------

  /api/v1/sites/{siteId}/email/log:
    get:
      operationId: listSiteEmailLog
      summary: List the email log for a site (keyset-paginated)
      description: |
        Returns a keyset-paginated list of outgoing email log entries for a
        site, ordered by `created_at DESC, id DESC`. The composite cursor
        predicate `(created_at, id)` ensures no rows are skipped when multiple
        sends share the same timestamp (batch sends).

        **Body privacy**: `body` is never returned in the list response,
        regardless of `body_stored`. Use `GET /email/log/{logId}` to retrieve
        the full detail including body.

        Requires `site.email.manage` permission and site access.
      tags: [email]
      parameters:
        - $ref: "#/components/parameters/SiteId"
        - name: cursor
          in: query
          description: Opaque keyset cursor from a previous page's `next_cursor`.
          schema:
            type: string
        - name: limit
          in: query
          description: Maximum entries to return (default 50, max 200).
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: status
          in: query
          description: Filter by status (sent | failed | pending).
          schema:
            type: string
        - name: from
          in: query
          description: >
            Start of date range (inclusive). RFC3339 or YYYY-MM-DD.
          schema:
            type: string
        - name: to
          in: query
          description: >
            End of date range (inclusive). RFC3339 or YYYY-MM-DD.
          schema:
            type: string
        - name: q
          in: query
          description: >
            Free-text search against subject, from_address, and to_addresses.
          schema:
            type: string
      responses:
        "200":
          description: Email log page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailLogList"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Site not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/sites/{siteId}/email/log/export:
    get:
      operationId: exportSiteEmailLog
      summary: Export email log as CSV or JSON
      description: |
        Streams up to 10,000 filtered log entries as CSV (default) or JSON.
        Body content is excluded from the export regardless of `body_stored`
        (privacy-by-default). Pass `format=json` for JSON output.

        Requires `site.email.manage` permission and site access.
      tags: [email]
      parameters:
        - $ref: "#/components/parameters/SiteId"
        - name: format
          in: query
          description: Output format — `csv` (default) or `json`.
          schema:
            type: string
            enum: [csv, json]
            default: csv
        - name: status
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
        - name: q
          in: query
          schema:
            type: string
      responses:
        "200":
          description: CSV or JSON export stream
          content:
            text/csv:
              schema:
                type: string
            application/json:
              schema:
                $ref: "#/components/schemas/EmailLogList"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/sites/{siteId}/email/log/{logId}:
    get:
      operationId: getSiteEmailLogEntry
      summary: Get a single email log entry (detail + body + prev/next navigation)
      description: |
        Returns a single email log entry. When `body_stored` is true and a
        body was captured at send time, it is included in this response.
        Also returns `prev_id` and `next_id` for in-detail navigation.

        Requires `site.email.manage` permission and site access.
      tags: [email]
      parameters:
        - $ref: "#/components/parameters/SiteId"
        - name: logId
          in: path
          required: true
          description: UUID of the email log entry.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Email log detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailLogDetail"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Log entry not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/sites/{siteId}/email/stats:
    get:
      operationId: getSiteEmailStats
      summary: Per-site email stats (sent/failed + per-day + per-provider)
      description: |
        Returns summary counts (total, sent, failed, provider count),
        a per-day time-series, and a per-provider breakdown for the given
        date range. Date range defaults to the last 30 days when omitted.

        Requires `site.email.manage` permission and site access.
      tags: [email]
      parameters:
        - $ref: "#/components/parameters/SiteId"
        - name: from
          in: query
          description: Start of date range (RFC3339 or YYYY-MM-DD).
          schema:
            type: string
        - name: to
          in: query
          description: End of date range (RFC3339 or YYYY-MM-DD).
          schema:
            type: string
      responses:
        "200":
          description: Email stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailStats"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/email/log:
    get:
      operationId: listFleetEmailLog
      summary: Fleet cross-site email log (all sites in tenant)
      description: |
        Returns a keyset-paginated cross-site email log for the tenant.
        Org-scope only (site-collaborators are blocked).
        Body is never included in the list.

        **Collaborator note**: collaborators who can read specific sites see
        those sites' data through the per-site `/sites/{siteId}/email/log`
        route. This fleet-level route is for full org members only.

        Requires `site.email.manage` permission.
      tags: [email]
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: status
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
        - name: q
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Fleet email log page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailLogList"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/email/stats:
    get:
      operationId: getFleetEmailStats
      summary: Fleet cross-site email stats
      description: |
        Returns tenant-wide summary counts and a per-day time-series for the
        given date range. Org-scope only.

        Requires `site.email.manage` permission.
      tags: [email]
      parameters:
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Fleet email stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailStats"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ---------------------------------------------------------------------------
  # Phase 4a — Suppression list + email log actions
  # ---------------------------------------------------------------------------

  /api/v1/sites/{siteId}/email/suppression:
    get:
      operationId: listSiteEmailSuppression
      summary: List suppression entries for a site
      description: |
        Returns a keyset-paginated list of suppression entries for this site
        (including fleet-wide entries). Each entry was created either by a
        provider webhook (hard_bounce / complaint) or manually added by an
        operator (manual / unsubscribe).

        Requires `site.email.manage` permission.
      tags: [email]
      parameters:
        - $ref: "#/components/parameters/SiteId"
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: reason
          in: query
          description: Filter by suppression reason (hard_bounce | complaint | unsubscribe | manual)
          schema:
            type: string
      responses:
        "200":
          description: Suppression page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailSuppressionPage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: addSiteEmailSuppression
      summary: Manually add a suppression entry for a site
      description: |
        Manually suppresses an email address for this site. `reason` must be
        `manual` or `unsubscribe` — hard_bounce and complaint entries are
        created automatically via provider webhooks and cannot be added manually
        (to prevent accidental data loss for transient bounces).

        Requires `site.email.manage` permission.
      tags: [email]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddSuppressionRequest"
      responses:
        "201":
          description: Suppression entry created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailSuppressionEntry"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/sites/{siteId}/email/suppression/{suppressionId}:
    delete:
      operationId: deleteSiteEmailSuppression
      summary: Delete a suppression entry
      description: |
        Removes a suppression entry by id. The operator is responsible for
        ensuring the removal is appropriate (e.g. the email address has
        unsubscribed from a suppression request rather than a hard bounce).

        Requires `site.email.manage` permission.
      tags: [email]
      parameters:
        - $ref: "#/components/parameters/SiteId"
        - name: suppressionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Suppression entry deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/email/suppression:
    get:
      operationId: listFleetEmailSuppression
      summary: Fleet-scope suppression list (all sites in tenant)
      description: |
        Returns all suppression entries across the tenant fleet. Org-scope only.
        Entries with `site_id=null` are fleet-wide suppressions that apply to
        every site in the tenant.

        Requires `site.email.manage` permission.
      tags: [email]
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: reason
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Fleet suppression page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailSuppressionPage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: addFleetEmailSuppression
      summary: Manually add a fleet-wide suppression entry
      description: |
        Adds a suppression entry with `site_id=null`, applying to all sites
        in the tenant. Useful for globally suppressing an address that generates
        bounces across multiple sites. `reason` must be `manual` or `unsubscribe`.

        Requires `site.email.manage` permission.
      tags: [email]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddSuppressionRequest"
      responses:
        "201":
          description: Fleet suppression entry created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailSuppressionEntry"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/email/suppression/{suppressionId}:
    delete:
      operationId: deleteFleetEmailSuppression
      summary: Delete a fleet-scope suppression entry
      description: |
        Removes a fleet-wide suppression entry (site_id IS NULL). If the entry
        belongs to a specific site, use the per-site delete route instead.

        Requires `site.email.manage` permission.
      tags: [email]
      parameters:
        - name: suppressionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Suppression entry deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/sites/{siteId}/email/log/{logId}/resend:
    post:
      operationId: resendEmailLog
      summary: Resend a single email log entry
      description: |
        Dispatches the `resend_email` agent command for the given log entry.
        Only available when `body_stored=true` on the log entry — returns 409
        otherwise. The resend is best-effort: if the agent is offline or returns
        an error the response contains `ok=false` with the agent's detail message
        but HTTP 200 is returned (matching the test-email pattern).

        The `resent_count` counter is incremented before the agent dispatch so
        operators can see how many resend attempts were made even if the agent
        was unavailable.

        Requires `site.email.manage` permission.
      tags: [email]
      parameters:
        - $ref: "#/components/parameters/SiteId"
        - name: logId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Resend dispatched (or gracefully failed — check `ok` field)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResendEmailResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Body not stored — resend unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/sites/{siteId}/email/log/bulk-resend:
    post:
      operationId: bulkResendEmailLog
      summary: Bulk resend email log entries (max 100)
      description: |
        Dispatches `resend_email` for multiple log entries. Each entry is
        processed independently. Entries without body_stored are skipped with
        `ok=false` in the per-entry result array (no overall 4xx).

        Requires `site.email.manage` permission.
      tags: [email]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkResendRequest"
      responses:
        "200":
          description: Per-entry resend results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkResendResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/sites/{siteId}/email/log/bulk-delete:
    post:
      operationId: bulkDeleteEmailLog
      summary: Bulk delete email log entries (max 500)
      description: |
        Deletes a list of email log entries by id. RLS ensures only entries
        belonging to the operator's tenant are deleted regardless of the id list.
        Maximum 500 ids per request.

        Requires `site.email.manage` permission.
      tags: [email]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkDeleteLogsRequest"
      responses:
        "200":
          description: Number of rows deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkDeleteLogsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ---------------------------------------------------------------------------
  # m62 — Multi-connection CRUD
  # ---------------------------------------------------------------------------

  /api/v1/sites/{siteId}/email/connections:
    get:
      operationId: listEmailConnections
      summary: List named email connections for a site
      description: |
        Returns all named provider connections that belong to the site's email
        config. Empty array when no named connections exist.

        Requires `site.email.manage` permission.
      tags: [email]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      responses:
        "200":
          description: List of named connections (secrets masked)
          content:
            application/json:
              schema:
                type: object
                required: [connections]
                properties:
                  connections:
                    type: array
                    items:
                      $ref: "#/components/schemas/EmailConnection"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/sites/{siteId}/email/connections/{connKey}:
    put:
      operationId: putEmailConnection
      summary: Create or update a named email connection
      description: |
        Creates or updates the named connection identified by `connKey` for the
        site's email config. The key must match `^[a-z0-9][a-z0-9_-]{0,31}$`;
        the value `default` is reserved and returns 400.

        Omit `secret` to preserve the existing stored credential. Provide an
        empty string to clear it.

        Requires `site.email.manage` permission.
      tags: [email]
      parameters:
        - $ref: "#/components/parameters/SiteId"
        - name: connKey
          in: path
          required: true
          schema:
            type: string
          description: Connection slug (^[a-z0-9][a-z0-9_-]{0,31}$).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PutEmailConnectionRequest"
      responses:
        "200":
          description: Saved connection (secret masked)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailConnection"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    delete:
      operationId: deleteEmailConnection
      summary: Delete a named email connection
      description: |
        Permanently deletes the named connection. Returns 404 when the key does
        not exist. Returns 409 when the key is referenced as `default_connection`
        or `fallback_connection` on the site's config row (remove the reference
        first).

        Requires `site.email.manage` permission.
      tags: [email]
      parameters:
        - $ref: "#/components/parameters/SiteId"
        - name: connKey
          in: path
          required: true
          schema:
            type: string
          description: Connection slug to delete.
      responses:
        "204":
          description: Connection deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  # ---------------------------------------------------------------------------
  # m62 — Org-level alert + digest notify settings
  # ---------------------------------------------------------------------------

  /api/v1/email/notify-settings:
    get:
      operationId: getEmailNotifySettings
      summary: Get email alert and digest settings
      description: |
        Returns the tenant-level email alert and digest notification settings.
        Always returns 200 with sensible defaults when no settings row exists
        yet (alerts_enabled=false, digest_enabled=false).

        Also returns `instance_mailer_configured` — when false, alerts and
        digests cannot be delivered even if enabled.

        Org-level route. Requires `site.email.manage` permission.
      tags: [email]
      responses:
        "200":
          description: Current notify settings (or defaults)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailNotifySettings"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    put:
      operationId: putEmailNotifySettings
      summary: Create or update email alert and digest settings
      description: |
        Creates or updates the tenant-level email notification settings.
        All fields are optional — omitted fields are unchanged (PATCH semantics
        within a PUT envelope).

        Org-level route. Requires `site.email.manage` permission.
      tags: [email]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PutEmailNotifySettingsRequest"
      responses:
        "200":
          description: Saved notify settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailNotifySettings"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/sites/{siteId}/perf/fonts:
    get:
      operationId: listFontResults
      summary: List font processing results for a site
      description: |
        Returns a page of the site's font_results catalog rows — the per-site
        dashboard view of every self-hosted font that has been discovered and
        processed (or is pending processing). Each row includes the source hash,
        font family, sizes, state (pending|ready|subset|negative), and the
        CP-derived savings_pct.

        Requires the `site:read` permission. Ordered by updated_at DESC, id DESC.
      tags: [performance]
      parameters:
        - $ref: "#/components/parameters/SiteId"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: A page of font results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FontResultList"

  /api/v1/sites/{siteId}/perf/rum/summary:
    get:
      operationId: getRumSummary
      summary: Get site-level Core Web Vitals p75 summary
      description: |
        Returns site-level Core Web Vitals p75 estimates (LCP, INP, CLS, FCP,
        TTFB) over a configurable window (default 28 days, matching CrUX/GSC),
        with good/needs-improvement/poor ratings per the official web-vitals
        thresholds. Any (metric, device, country) slice whose scaled sample
        count is below the site's min_sample_count floor is returned with
        suppressed=true and p75_ms=0; the dashboard must render
        "insufficient samples (N of M needed)" for those rows.

        Requires the `site:read` permission.
      tags: [performance]
      parameters:
        - $ref: "#/components/parameters/SiteId"
        - in: query
          name: window_days
          schema:
            type: integer
            minimum: 1
            maximum: 365
            default: 28
          description: Number of days to include in the summary window (default 28).
      responses:
        "200":
          description: RUM Core Web Vitals summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RumSummary"

  /api/v1/sites/{siteId}/perf/rum:
    get:
      operationId: listRumResults
      summary: List per-URL RUM Core Web Vitals breakdown rows
      description: |
        Returns per-URL/metric/device/country p75 breakdown rows for the
        dashboard table. Each row includes the url_pattern, metric, device,
        country, p75_ms, sample_count, the CWV rating band, and a suppressed
        flag. Rows below the site's min_sample_count floor have suppressed=true
        and p75_ms=0; the dashboard renders "insufficient samples" for those.

        Requires the `site:read` permission.
      tags: [performance]
      parameters:
        - $ref: "#/components/parameters/SiteId"
        - in: query
          name: window_days
          schema:
            type: integer
            minimum: 1
            maximum: 365
            default: 28
          description: Number of days to include in the window (default 28).
      responses:
        "200":
          description: List of per-URL RUM breakdown rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RumResultList"

  /api/v1/sites/{siteId}/perf/rucss/results:
    get:
      operationId: listRucssResults
      summary: List cached Used-CSS (RUCSS) results for a site
      description: |
        Returns a page of the site's cached Remove-Unused-CSS results (one row
        per page structure hash, with original/used byte sizes and the
        reduction percentage). Requires the `site:read` permission.
      tags: [performance]
      parameters:
        - $ref: "#/components/parameters/SiteId"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: A page of cached RUCSS results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RucssResultList"
  /api/v1/sites/{siteId}/perf/rucss/clear:
    post:
      operationId: clearRucss
      summary: Drop all cached Used-CSS results for a site
      description: |
        Clears every cached RUCSS result for the site. Returns the number
        cleared. Requires the `site.perf.config` permission.
      tags: [performance]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      responses:
        "200":
          description: Cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RucssClearResult"
  /api/v1/sites/{siteId}/perf/rucss/compute:
    post:
      operationId: computeRucss
      summary: Trigger an on-demand Remove-Unused-CSS computation
      description: |
        Triggers the agent to compute Used-CSS for the given URLs (or the home
        page when omitted). The agent self-fetches each URL out-of-band so the
        optimizer runs the RUCSS stage and posts the page to the control plane,
        enqueuing a compute job. The queued → computing → completed lifecycle is
        streamed via the `rucss.*` SSE events. Requires the `site.perf.config`
        permission.
      tags: [performance]
      parameters:
        - $ref: "#/components/parameters/SiteId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                urls:
                  type: array
                  items:
                    type: string
                  description: Same-host URLs to compute; empty computes the home page.
      responses:
        "200":
          description: Compute acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PerfActionResult"
  /api/v1/cache/bulk-purge:
    post:
      operationId: bulkPurgeCache
      summary: Purge the page cache across many sites
      description: |
        Purges the whole cache for each site in `site_ids`. Each site id is
        checked against the caller's collaborator allowlist independently; sites
        the caller cannot access (or that fail) are returned with `ok: false`
        and a `detail` rather than failing the whole call. Requires the
        `site.cache.purge` permission.
      tags: [performance]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkPurgeRequest"
      responses:
        "200":
          description: Per-site purge results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkResultList"
  /api/v1/cache/bulk-config:
    put:
      operationId: bulkConfigCache
      summary: Apply a performance preset across many sites
      description: |
        Spreads a preset's toggles (`safe`, `balanced`, or `aggressive`) onto
        each site's existing config without clobbering its per-site include or
        bypass lists. Each site id is checked against the caller's allowlist
        independently. Requires the `site.perf.config` permission.
      tags: [performance]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkConfigRequest"
      responses:
        "200":
          description: Per-site apply results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkResultList"
        "422":
          description: Invalid preset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/clients:
    get:
      operationId: listClients
      summary: List agency clients
      description: Returns the list of agency clients for the current tenant, ordered by name. Archived clients are excluded unless include_archived=true is passed.
      tags: [clients]
      parameters:
        - name: include_archived
          in: query
          schema:
            type: boolean
          description: When true, includes archived clients in the response.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgencyClientList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createClient
      summary: Create an agency client
      tags: [clients]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgencyClientRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgencyClient"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/clients/assignments:
    put:
      operationId: assignSitesToClient
      summary: Assign (or unassign) a batch of sites to a client
      description: Pass client_id to assign; omit or pass null to unassign. Maximum 500 site_ids per request.
      tags: [clients]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignSitesRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignSitesResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/clients/{clientId}:
    get:
      operationId: getClient
      summary: Get a single agency client
      tags: [clients]
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgencyClient"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateClient
      summary: Update an agency client
      tags: [clients]
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgencyClientRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgencyClient"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteClient
      summary: Delete an agency client
      description: Permanently deletes the client. Sites assigned to the client are unassigned (ON DELETE SET NULL) but not deleted.
      tags: [clients]
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/clients/{clientId}/report-schedule:
    get:
      operationId: getClientReportSchedule
      summary: Get the report schedule for a client
      description: Returns the current report schedule configuration. If no schedule has been saved yet, returns sensible defaults (disabled, monthly).
      tags: [clients]
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The report schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientReportSchedule"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: putClientReportSchedule
      summary: Create or update the report schedule for a client
      tags: [clients]
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientReportScheduleUpdate"
      responses:
        "200":
          description: The saved report schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientReportSchedule"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/clients/{clientId}/reports:
    get:
      operationId: listClientReports
      summary: List generated reports for a client
      description: Returns generated reports in reverse chronological order (newest first). Supports keyset cursor pagination.
      tags: [clients]
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: cursor
          in: query
          description: Opaque keyset cursor returned by a previous call.
          schema:
            type: string
        - name: limit
          in: query
          description: Maximum number of items to return (1–100, default 20).
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Paginated list of generated reports
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientReportList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: generateClientReport
      summary: Trigger an on-demand report for a client
      description: Enqueues a report generation job. Returns 202 Accepted immediately; poll GET /reports/{reportId} for status. When notify=true and the schedule has recipients, an email is sent on completion.
      tags: [clients]
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateClientReportRequest"
      responses:
        "202":
          description: Report job accepted — poll the returned report for status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientReport"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/clients/{clientId}/reports/{reportId}:
    get:
      operationId: getClientReport
      summary: Get a generated report by ID
      description: Returns the report record. When status is `completed`, `html_url` and `pdf_url` are pre-signed download links (valid 7 days).
      tags: [clients]
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: reportId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The report record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientReport"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteClientReport
      summary: Delete a generated report
      description: Deletes the report record and its stored blobs (HTML + PDF) from object storage.
      tags: [clients]
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: reportId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # m66 — Client portal member management (agency side)
  # ---------------------------------------------------------------------------

  /api/v1/clients/{clientId}/members:
    get:
      operationId: listClientMembers
      summary: List portal members for a client
      description: Returns the roster of portal users granted access to this client.
      tags: [clients]
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Member list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientMemberList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: addClientMember
      summary: Add or invite a portal member
      description: >
        If the email belongs to a known user, grants portal access immediately
        and returns `201` with the member record. If the email is unknown, creates
        a client-scope invitation and returns `201` with `invited: true` and an
        `accept_link` (always present as a copyable fallback when SMTP is
        unconfigured).
      tags: [clients]
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientMemberCreateRequest"
      responses:
        "201":
          description: Member added or invited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientMemberInviteResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/clients/{clientId}/members/{userId}:
    delete:
      operationId: removeClientMember
      summary: Revoke portal access for a member
      description: Immediately removes the client_members row. The user's session remains valid but subsequent portal requests resolve no tenant.
      tags: [clients]
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/clients/{clientId}/invitations:
    get:
      operationId: listClientInvitations
      summary: List portal invitations for a client
      description: Returns all client-scope invitations (pending, accepted, expired, revoked).
      tags: [clients]
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Invitation list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientInvitationList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/clients/{clientId}/invitations/{invitationId}:
    delete:
      operationId: revokeClientInvitation
      summary: Revoke a pending portal invitation
      description: Soft-revokes the invitation. The accept link becomes inert.
      tags: [clients]
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: invitationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/clients/{clientId}/invitations/{invitationId}/regenerate:
    post:
      operationId: regenerateClientInvitation
      summary: Regenerate a portal invitation token
      description: Rotates the token (kills the old link), resets expiry and attempt counter, and clears any prior revocation.
      tags: [clients]
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: invitationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Regenerated invitation with new accept_link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientMemberInviteResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # m66 — Client portal endpoints (portal side; RequireClientPortal gating)
  # ---------------------------------------------------------------------------

  /api/v1/portal/overview:
    get:
      operationId: getPortalOverview
      summary: Portal overview (client branding + site count)
      description: Returns identity and branding for the portal principal's primary client.
      tags: [portal]
      responses:
        "200":
          description: Portal overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalOverview"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/portal/sites:
    get:
      operationId: listPortalSites
      summary: List sites accessible to the portal principal
      description: Returns a summary of each site the portal user can see (their client's sites only).
      tags: [portal]
      responses:
        "200":
          description: Site list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalSiteList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/portal/sites/{siteId}/uptime:
    get:
      operationId: getPortalSiteUptime
      summary: Uptime summary for a portal site
      description: Returns windowed uptime percentage, average latency, TLS expiry, and incident history.
      tags: [portal]
      parameters:
        - name: siteId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: range
          in: query
          schema:
            type: string
            enum: [24h, 7d, 30d, 90d]
            default: 30d
      responses:
        "200":
          description: Uptime summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalUptimeSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/portal/sites/{siteId}/backups:
    get:
      operationId: listPortalSiteBackups
      summary: Backup inventory for a portal site
      description: Returns completed backups only. No blob keys, destinations, or download links are included.
      tags: [portal]
      parameters:
        - name: siteId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            maximum: 20
            default: 10
      responses:
        "200":
          description: Backup list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalBackupList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/portal/sites/{siteId}/updates:
    get:
      operationId: listPortalSiteUpdates
      summary: Applied updates log for a portal site
      description: Returns successfully applied update tasks only.
      tags: [portal]
      parameters:
        - name: siteId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            maximum: 50
            default: 20
      responses:
        "200":
          description: Update list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalUpdateList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/portal/sites/{siteId}/vitals:
    get:
      operationId: getPortalSiteVitals
      summary: Core Web Vitals p75 summary for a portal site
      description: Returns all-devices aggregate p75 field data for LCP, INP, and CLS.
      tags: [portal]
      parameters:
        - name: siteId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: range
          in: query
          schema:
            type: string
            enum: [28d]
            default: 28d
      responses:
        "200":
          description: Vitals summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalVitalsSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/portal/reports:
    get:
      operationId: listPortalReports
      summary: List completed reports for the portal principal
      description: >
        Returns completed white-label reports for all of the principal's clients.
        The client_id = ANY(principal.ClientIDs) filter is enforced in the query.
      tags: [portal]
      responses:
        "200":
          description: Report list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalReportList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/portal/reports/{reportId}/download:
    get:
      operationId: downloadPortalReport
      summary: Get a presigned download URL for a portal report
      description: >
        Returns a presigned URL for the HTML or PDF version of a completed report.
        The report must belong to one of the principal's clients; otherwise 404 is
        returned (not 403, to avoid confirming report existence).
      tags: [portal]
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: format
          in: query
          required: true
          schema:
            type: string
            enum: [html, pdf]
      responses:
        "200":
          description: Presigned download URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalReportDownload"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  responses:
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Insufficient permission
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    UnprocessableEntity:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Conflict — resource is referenced and cannot be deleted
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  parameters:
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 200
        default: 50
    Offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        format: int32
        minimum: 0
        default: 0
    TenantId:
      name: tenantId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SiteId:
      name: siteId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ApiKeyId:
      name: apiKeyId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RunId:
      name: runId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SnapshotId:
      name: snapshotId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RestoreId:
      name: restoreId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DestinationId:
      name: destinationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    OrgId:
      name: orgId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  securitySchemes:
    AgentSignature:
      type: apiKey
      in: header
      name: X-WPMgr-Signature
      description: |
        Ed25519 signed-request authentication for agent->control-plane calls. The
        agent sends four headers: X-WPMgr-Agent-Key (its base64 Ed25519 public
        key, identifying the enrolled site), X-WPMgr-Timestamp (Unix seconds),
        X-WPMgr-Nonce (a unique per-request token), and X-WPMgr-Signature (the
        base64 Ed25519 signature over the canonical message
        "METHOD\nPATH\nTIMESTAMP\nNONCE\nhex(sha256(body))"). The control plane
        rejects stale timestamps and replayed nonces. (apiKey type is the closest
        OpenAPI 3.1 primitive for this header-carried signature scheme.)
  schemas:
    Health:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
        version:
          type: string
    Readiness:
      type: object
      required: [status, checks]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        checks:
          type: object
          additionalProperties:
            type: string
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Stable machine-readable error code.
        message:
          type: string
          description: Human-readable error description.
        details:
          type: object
          additionalProperties: true
    Tenant:
      type: object
      required: [id, name, slug, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    TenantCreate:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        slug:
          type: string
          minLength: 1
          maxLength: 64
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
    TenantList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Tenant"
    Site:
      type: object
      required:
        [id, tenant_id, url, name, status, wp_version, php_version, health_status, multisite, tags, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        name:
          type: string
        status:
          type: string
          enum: [pending, active, error, disabled]
        wp_version:
          type: string
        php_version:
          type: string
        health_status:
          type: string
          enum: [unknown, healthy, unreachable]
        connection_state:
          type: string
          description: |
            M21 / ADR-041 — the single source of truth for the agent connection
            lifecycle. Surfaced live on the /api/v1/sites/events SSE `site`
            payload; surfacing it on this strict REST Site shape is a Phase 4
            follow-up (the legacy status/health_status remain in sync meanwhile).
          enum: [pending_enrollment, connected, degraded, disconnected, revoked, archived]
        connection_generation:
          type: integer
          format: int32
          description: M21 — bumps on each re-enrollment under the same site_id.
        disconnected_reason:
          type: string
          description: M21 — reason recorded on the last down transition.
        server_info:
          type: string
        multisite:
          type: boolean
        active_theme:
          type: string
        tags:
          type: array
          items:
            type: string
        enrolled:
          type: boolean
          description: Whether an agent has enrolled this site.
        enrolled_at:
          type: string
          format: date-time
        last_seen_at:
          type: string
          format: date-time
        components:
          $ref: "#/components/schemas/SiteComponents"
        agent_version:
          type: string
          description: Current WPMgr agent plugin version (last-synced via metadata push). Empty/absent until the site re-syncs on a newer agent.
        host_provider:
          type: string
          description: Inferred hosting/infrastructure provider (e.g. DigitalOcean, Hetzner, AWS), derived control-plane-side from the agent's observed public egress IP via an offline ASN lookup. Best-effort hint shown only when no managed-host flag matched. Empty/absent until inferred.
        host_provider_org:
          type: string
          description: Raw Autonomous System organization for the inferred network (e.g. "Hetzner Online GmbH"). Display fallback when host_provider (the canonical name) is empty but the network is known. Empty/absent until inferred.
        host_provider_ip:
          type: string
          description: The public egress IP the host inference used (the agent's observed or reported IP). Surfaced to the site's own operators for debugging. Empty/absent until inferred.
        updates_available:
          type: integer
          format: int32
          description: Count of plugins + themes + core with an available update (last-synced).
        last_backup_at:
          type: string
          format: date-time
          description: Time of the most recent backup snapshot (finished_at, falling back to created_at).
        last_backup_status:
          type: string
          enum: [success, running, failed]
          description: Normalized status of the most recent backup snapshot (DB 'completed'→'success', 'pending'→'running').
        client_id:
          type: string
          format: uuid
          description: UUID of the agency client this site is grouped under (m63). Absent when the site has no client.
        client_name:
          type: string
          description: Display name of the agency client this site is grouped under (m63). Absent when the site has no client.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SiteComponents:
      type: object
      description: Installed plugin/theme inventory pushed by the agent.
      properties:
        plugins:
          type: array
          items:
            $ref: "#/components/schemas/SiteComponent"
        themes:
          type: array
          items:
            $ref: "#/components/schemas/SiteComponent"
        core_update:
          type: object
          nullable: true
          description: When set, WordPress core has an update available.
          required: [new_version, current_version]
          properties:
            new_version:
              type: string
            current_version:
              type: string
    SiteComponent:
      type: object
      required: [slug]
      properties:
        slug:
          type: string
        name:
          type: string
        version:
          type: string
        active:
          type: boolean
        available_update:
          type: object
          nullable: true
          description: When set, an update is available for this plugin/theme.
          required: [new_version]
          properties:
            new_version:
              type: string
            package:
              type: string
              nullable: true
            tested:
              type: string
              nullable: true
            requires_php:
              type: string
              nullable: true
    SiteAvailableUpdates:
      type: object
      description: Per-site cached list of items with updates available.
      required: [site_id, items]
      properties:
        site_id:
          type: string
          format: uuid
        core_update:
          type: object
          nullable: true
          required: [new_version, current_version]
          properties:
            new_version:
              type: string
            current_version:
              type: string
        items:
          type: array
          items:
            type: object
            required: [type, slug, name, version, new_version, active]
            properties:
              type:
                type: string
                enum: [plugin, theme]
              slug:
                type: string
              name:
                type: string
              version:
                type: string
              new_version:
                type: string
              active:
                type: boolean
              package:
                type: string
                nullable: true
              tested:
                type: string
                nullable: true
              requires_php:
                type: string
                nullable: true
        as_of:
          type: string
          format: date-time
          nullable: true
    SiteTags:
      type: object
      required: [tags]
      properties:
        tags:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 64
    PairingCodeCreate:
      type: object
      properties:
        site_name:
          type: string
          maxLength: 200
        tags:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 64
    PairingCode:
      type: object
      required: [id, tenant_id, code, expires_at, created_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        code:
          type: string
          description: The one-time plaintext pairing code. Shown ONCE; never stored.
        site_name:
          type: string
        tags:
          type: array
          items:
            type: string
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
    EnrollRequest:
      type: object
      required: [pairing_code, site_url, agent_public_key]
      properties:
        pairing_code:
          type: string
          maxLength: 128
        site_url:
          type: string
          format: uri
          maxLength: 2048
        agent_public_key:
          type: string
          description: The agent's own Ed25519 public key, base64 (std) encoded.
        name:
          type: string
          maxLength: 200
        wp_version:
          type: string
          maxLength: 32
        php_version:
          type: string
          maxLength: 32
        tags:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 64
    EnrollResponse:
      type: object
      required: [site_id, tenant_id, control_plane_public_key]
      properties:
        site_id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        control_plane_public_key:
          type: string
          description: |
            The control plane's Ed25519 PUBLIC signing key (base64 std). The agent
            uses it to verify control-plane->agent commands.
    SiteEnrollmentCode:
      type: object
      description: |
        M21 — the once-shown enrollment code returned by the site-first create
        and the begin-re-enrollment endpoints. The plaintext code is never
        retrievable again.
      required: [site_id, enrollment_code, expires_at]
      properties:
        site_id:
          type: string
          format: uuid
        enrollment_code:
          type: string
          description: The single-use, site-bound pairing code (shown once).
        expires_at:
          type: string
          format: date-time
    SiteLifecycleReason:
      type: object
      description: Optional reason recorded in connection history + audit.
      properties:
        reason:
          type: string
          maxLength: 200
    AgentHeartbeat:
      type: object
      description: |
        M21 / ADR-039 — the light 60s heartbeat body the WordPress agent sends.
        All fields are optional and accepted best-effort: the beat is about
        liveness, not the payload. Forward-compatible (additive) so a future CP
        can render drift without a separate metadata pull.
      properties:
        site_id:
          type: string
          description: The enrolled site UUID (echoed for convenience; auth binds the real identity).
        ts:
          type: integer
          format: int64
          description: Unix seconds at send time.
        status:
          type: string
          description: Agent self-reported status, currently always "ok".
        wp_version:
          type: string
          maxLength: 32
        php_memory:
          type: string
          maxLength: 32
          description: PHP memory_limit (ini_get).
        plugin_versions:
          type: object
          additionalProperties:
            type: string
          description: Compact plugin-file => version map.
        installed_updates_count:
          type: integer
          description: Count of available plugin + theme + core updates (from cached transients).
        multisite:
          type: boolean
    AgentHeartbeatResult:
      type: object
      description: M21 — heartbeat acknowledgement with optional pending instructions.
      required: [ok]
      properties:
        ok:
          type: boolean
        instructions:
          type: array
          description: Pending agent instructions, e.g. ["revoke"].
          items:
            type: string
        revoke_token:
          type: string
          description: |
            Present with a `["revoke"]` instruction: a short-lived signed Ed25519
            JWT (aud=site_id, cmd="revoke") the agent MUST verify with the CP
            public key before any self-teardown (ADR-040 addendum). Fail-closed —
            an absent/invalid token must be a no-op.
    AgentDisconnect:
      type: object
      description: M21 — the signed last-will body.
      properties:
        site_id:
          type: string
          description: The enrolled site UUID (echoed for convenience; auth binds the real identity).
        reason:
          type: string
          maxLength: 64
          description: deactivated | uninstalled | user_initiated
    AgentMediaSyncBatch:
      type: object
      description: |
        ADR-043 — one page (≤200) of enumerated media attachments. Every page
        also carries the sync `job_id` so the CP can scope the enumeration and so
        the matching `/agent/v1/media/sync-finalize` call (sent only after a clean
        full enumeration) can reconcile offline deletions against this run's pages.
      required: [attachments]
      properties:
        job_id: { type: string }
        attachments:
          type: array
          maxItems: 200
          items:
            type: object
            properties:
              wp_attachment_id: { type: integer, format: int64 }
              title: { type: string }
              original_path: { type: string }
              original_url: { type: string }
              original_mime: { type: string }
              original_width: { type: integer, nullable: true }
              original_height: { type: integer, nullable: true }
              original_size_bytes: { type: integer, format: int64 }
    AgentMediaPresign:
      type: object
      description: ADR-043 — request presigned PUT URLs (presign) or signal sources uploaded (encode-ready).
      required: [job_id, variants]
      properties:
        job_id: { type: string }
        variants:
          type: array
          maxItems: 10
          items:
            type: object
            properties:
              name: { type: string }
              source_size: { type: integer, format: int64 }
              source_mime: { type: string }
    AgentMediaJobStatus:
      type: object
      description: ADR-043 — apply / delete-originals result reported to the CP.
      required: [job_id]
      properties:
        job_id: { type: string }
        applied_variants:
          type: array
          items: { type: string }
        sizes_unoptimized:
          type: object
          additionalProperties: { type: string }
        current_format: { type: string }
        current_size_bytes: { type: integer, format: int64 }
        bytes_before: { type: integer, format: int64, nullable: true }
        bytes_after: { type: integer, format: int64, nullable: true }
        compression_level: { type: string }
        target_format: { type: string }
        rewrite_stats:
          type: object
          additionalProperties: true
        error: { type: string }
    AgentMediaRestoreStatus:
      type: object
      description: ADR-043 — restore result reported to the CP.
      required: [job_id, restored]
      properties:
        job_id: { type: string }
        restored: { type: boolean }
        error: { type: string }
    AgentMediaAssetDeleted:
      type: object
      description: |
        ADR-043 — the agent's `delete_attachment` hook fired: a WP attachment was
        deleted (wp-admin, programmatic, WP-CLI, or REST). The agent has already
        removed its own untracked originals from disk (the *.wpmgr-original.<ext>
        archive in replace mode, the original-ext twin in coexist mode); this
        signals the CP to reconcile the site_media_assets row. Best-effort from
        the agent — the sync sweep is the backstop.
      required: [wp_attachment_id]
      properties:
        wp_attachment_id: { type: integer, format: int64 }
    AgentMediaSyncFinalize:
      type: object
      description: |
        ADR-043 — a FULL paged media enumeration completed cleanly. Sent ONLY
        after every sync-batch page succeeded (a partial/errored run must NOT
        finalize — the blast-radius guard against a transiently-empty WP wiping
        the asset list). The CP marks any site_media_assets row NOT seen in this
        job's pages as deleted (offline-deletion reconciliation).
      required: [job_id]
      properties:
        job_id: { type: string }
    FontTranscodeRequest:
      type: object
      description: |
        M54 Phase 1 — body the agent POSTs to /agent/v1/fonts/transcode when
        it encounters a self-hosted font that needs WOFF2 encoding.
        The agent MUST NOT supply a storage key; the CP derives all keys
        server-side from the verified tenant identity + source_hash.
      required: [source_hash, source_size]
      properties:
        source_hash:
          type: string
          description: |
            Hex-encoded BLAKE3 content hash of the raw source font bytes.
            Must be exactly 64 lowercase hex characters. The CP validates this
            strictly before deriving any storage keys — malformed values are
            rejected with 422.
          pattern: "^[0-9a-f]{64}$"
          example: "abcdef1234567890abcdef1234567890abcdef1234567890abcdef1234567890"
        source_size:
          type: integer
          format: int64
          description: Byte length of the source font. Must be > 0. Capped at 10 MiB.
          minimum: 1
        source_ext:
          type: string
          description: >
            File extension hint: "ttf", "otf", or "woff". Informational only;
            the CP detects the real format from the magic bytes on the uploaded
            object. Omit for WOFF2 (transcoding is a no-op for WOFF2).
          enum: [ttf, otf, woff]

    FontTranscodeResponse:
      type: object
      description: |
        M54 Phase 1 — CP's reply to a FontTranscodeRequest.
      required: [state]
      properties:
        state:
          type: string
          enum: [pending, ready, negative]
          description: |
            "pending"  — a job is enqueued or in flight. `source_put_url` is
                         present on the first-enqueue response; absent on polls.
            "ready"    — WOFF2 is available. `woff2_get_url` and `woff2_key`
                         are present.
            "negative" — permanent failure; serve the original font forever.
        source_put_url:
          type: string
          description: |
            Presigned S3 PUT URL (15-min TTL) for the raw source font bytes.
            Present ONLY when state=="pending" AND the job was just freshly
            enqueued. The agent MUST PUT the source bytes here (Content-Type:
            application/octet-stream) before the encoder can run.
            Absent on subsequent polls (source already uploaded).
        woff2_key:
          type: string
          description: |
            Server-derived object-storage key for the WOFF2 output.
            Present only when state=="ready". Informational — the agent MUST
            NOT presign this key itself; use woff2_get_url instead.
        woff2_get_url:
          type: string
          description: |
            Short-TTL presigned GET URL for the WOFF2 object, minted by the
            CP using the server-derived, GuardStorageKey-validated,
            tenant-scoped key. Present ONLY when state=="ready". The agent
            fetches the WOFF2 bytes from this URL. The agent MUST NOT
            presign or construct any storage key itself — that would
            reintroduce the path-traversal risk this design prevents.
        error_detail:
          type: string
          description: Short diagnostic string. Present only when state=="negative".

