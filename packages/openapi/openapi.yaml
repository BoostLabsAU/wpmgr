            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  cancelled_count: { type: integer }
  /api/v1/sites/{siteId}/media/jobs:
    get:
      operationId: listMediaJobs
      summary: List media optimization jobs for a site
      tags: [media]
      parameters:
        - $ref: "#/components/parameters/SiteId"
        - { name: cursor, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, default: 50 } }
