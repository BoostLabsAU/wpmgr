    BackupEvent:
      type: object
      description: |
        One snapshot-progress transition streamed over SSE. Status mirrors the
        parent snapshot's status at publish time so a subscriber can detect a
        terminal state (completed/failed) and close the EventSource. Phase
        values come from the closed `allowedProgressPhases` set on the CP.
      required: [snapshot_id, phase, status, ts]
      properties:
        snapshot_id:
          type: string
          format: uuid
        phase:
          type: string
          # Closed set matching TaskRunner::PHASE_* constants and CP allowedProgressPhases.
          # The legacy phases compressing_files / encrypting / uploading were retired with
          # the phpbu pipeline (ADR-033); encrypting_uploading is the single unified phase.
          enum:
            - queued
            - dumping_db
            - archiving_files
            - encrypting_uploading
            - submitting_manifest
            - completed
            - failed
        phase_detail:
          type: object
          additionalProperties: true
          description: Pass-through of the agent's POST /progress payload (e.g. chunk counters).
        status:
          type: string
          enum: [pending, running, completed, failed]
        ts:
          type: string
          format: date-time
    BackupCreate:
      type: object
      description: Request to start a backup of a site.
      properties:
        kind:
          type: string
          enum: [files, db, full]
          default: full
          description: What to back up. Defaults to full (files + database).
    BackupSnapshot:
      type: object
      required: [id, tenant_id, site_id, kind, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        site_id:
          type: string
          format: uuid
        created_by:
          type: string
          format: uuid
        kind:
          type: string
          enum: [files, db, full]
        status:
          type: string
          enum: [pending, running, completed, failed]
        age_recipient:
          type: string
          description: |
            The age PUBLIC recipient the chunks were encrypted to (provenance).
            NEVER a private key; the control plane cannot decrypt backups.
        total_size:
          type: integer
          format: int64
        chunk_count:
          type: integer
          format: int64
        archived:
          type: boolean
          description: Kept by the monthly-archive retention rule.
        error:
          type: string
        progress:
          type: object
          additionalProperties: true
          description: |
            M5.6 / ADR-032 phpbu runner progress. Empty `{}` until the runner posts
            its first phase. Shape:
              { "phase": "uploading", "phase_detail": {"chunks_done": 17, "chunks_total": 42, ...} }
            Phases form a closed set (see backup.allowedProgressPhases on the CP).
        progress_updated_at:
          type: string
          format: date-time
          description: |
            Server timestamp of the last progress POST from the runner. Used by the
            CP watchdog (>120s without an update on a running snapshot → marked
            failed/stalled) and by the frontend to detect a silent runner.
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        is_incremental:
          type: boolean
          description: |
            ADR-048 incremental backup. True if this snapshot only stores files
            changed since its parent; false for full-base snapshots and all
            pre-m44 rows.
        generation:
          type: integer
          description: |
            Position of this snapshot within its incremental chain. 0 is the
            full base; 1+ are successive incrementals.
        chain_id:
          type: string
          format: uuid
          description: Groups a full base and its incrementals into one chain. Null for legacy/full-base rows.
        parent_snapshot_id:
          type: string
          format: uuid
          description: The snapshot this incremental was diffed against. Null for full-base rows.
        base_snapshot_id:
          type: string
          format: uuid
          description: The full-base snapshot at the root of this chain. Null for legacy/full-base rows.
        locked:
          type: boolean
          description: |
            Track C (m49). When true the retention GC will never auto-prune this
            snapshot. Unlock via DELETE /backups/{snapshotId}/lock to restore
            normal GC eligibility.
    BackupSnapshotList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/BackupSnapshot"
    BackupManifestEntry:
      type: object
      required: [path, entry_kind, size, chunk_count]
      description: One file (or db dump) in a snapshot, summarized.
      properties:
        path:
          type: string
        entry_kind:
          type: string
          # file = legacy lumped wp-content part; plugin/theme/upload/wp-content
          # are the Track-5 per-component archive parts; db = the SQL dump. The
          # ADR-051 archive-delta bookkeeping kinds (files-list, tombstones) are
          # internal and never surfaced in this operator-facing detail.
          enum: [file, db, plugin, theme, upload, wp-content]
        table_name:
          type: string
          description: Set for db entries (partial restore-by-table).
        size:
          type: integer
          format: int64
        mode:
          type: integer
          format: int32
        chunk_count:
          type: integer
          format: int32
          description: Number of ordered ciphertext chunks reassembling the path.
    BackupSnapshotDetail:
      type: object
      required: [snapshot, entries]
      properties:
        snapshot:
          $ref: "#/components/schemas/BackupSnapshot"
        entries:
          type: array
          items:
            $ref: "#/components/schemas/BackupManifestEntry"
    RestoreCreate:
      type: object
      description: |
        Restore selection. Omit both arrays (or set full=true) for a full
        restore; provide paths for partial file restore, or db_tables for partial
        db restore. `components` further restricts the operation to specific
        backup components ("files" and/or "db"); see field doc below.
      properties:
        full:
          type: boolean
          default: false
        paths:
          type: array
          items:
            type: string
          description: Site-relative file paths to restore.
        db_tables:
          type: array
          items:
            type: string
          description: Database table names to restore.
        components:
          type: array
          description: >
            Which backup components to restore. When omitted, restores all
            components in the snapshot. Valid values:

              - "files"      — broad-strokes alias for ALL file components
                               (plugin + theme + upload + wp-content). Use
                               this for "restore everything except the DB".
              - "db"         — the database dump.
              - "plugin"     — wp-content/plugins/* only (Track 5).
              - "theme"      — wp-content/themes/* only (Track 5).
              - "upload"     — wp-content/uploads/* only (Track 5).
              - "wp-content" — everything ELSE under wp-content (mu-plugins,
                               languages, drop-ins, custom dirs — NOT
                               plugins/themes/uploads) (Track 5).

            Examples — to restore only the database, pass ["db"]. To restore
            only files, pass ["files"]. To restore both, pass ["files","db"]
            or omit. To restore only plugins, pass ["plugin"]. To restore
            plugins + uploads, pass ["plugin","upload"].
          items:
            type: string
            enum: [files, db, plugin, theme, upload, wp-content]
          uniqueItems: true
        keep_old_files:
          type: boolean
          description: >
            When true, the agent keeps the pre-restore wp-content tree at
            .wpmgr-old-files-<id>/ for 24 hours as a manual rollback affordance.
            When false (default), the agent cleans it up immediately after a
            successful restore.
          default: false
        target_site_url:
          type: string
          format: uri
          nullable: true
          description: >
            When set, the agent will rewrite `siteurl` and `home` references
            from the snapshot's source URLs to this target. When unset, the
            agent uses the current site's URL (no-op when restoring to the
            same environment). Required for cross-environment restores
            (dev->prod, staging->prod). The control plane derives this from
            the destination Site.URL when the restore is dispatched, so
            callers typically don't need to set it.
    SqlInspection:
      type: object
      description: |
        Structured projection of a backup snapshot's SQL dump. Produced either
        by the agent at backup time (preferred; "source": "agent") or by the
        control plane's legacy streaming parser (fallback; "source":
        "cp-legacy"). `truncated: true` indicates the parser hit its CPU/time
        budget; tables/totals may be incomplete.
      required: [schema_version, source, is_wordpress, tables, generated_at]
      properties:
        schema_version:
          type: integer
          description: Report wire-shape version; bump when the JSON shape changes.
        dump_bytes:
          type: integer
          format: int64
          description: Total plaintext bytes scanned from the dump.
        charset:
          type: string
          description: Connection-level charset from SET NAMES (e.g. utf8mb4).
        collation:
          type: string
          description: Default collation declared in CREATE TABLE trailers, if any.
        table_prefix:
          type: string
          description: |
            Most common table-name prefix (chars up to the first underscore);
            empty when no consistent prefix could be determined.
        wp_version:
          type: string
          nullable: true
          description: WordPress db_version from wp_options, when detectable.
        siteurl:
          type: string
          nullable: true
          description: WordPress siteurl from wp_options, when detectable.
        home:
          type: string
          nullable: true
          description: WordPress home from wp_options, when detectable.
        is_wordpress:
          type: boolean
          description: True when a {prefix}options table is present in the dump.
        truncated:
          type: boolean
          description: True when the parser hit its budget before finishing.
        source:
          type: string
          enum: [agent, cp-legacy]
          description: |
            "agent" — the JSON was produced by the agent at backup time and
            stored as a snapshot artifact. "cp-legacy" — the CP streamed the
            dump artifact through its own parser as a fallback.
        parser_warnings:
          type: array
          items:
            type: string
          description: Non-fatal scanner warnings (oversized rows, regex anomalies).
        tables:
          type: array
          description: Per-table inventory; row/byte estimates are best-effort.
          items:
            type: object
            required: [name, rows_estimate]
            properties:
              name:
                type: string
              rows_estimate:
                type: integer
                format: int64
              bytes_estimate:
                type: integer
                format: int64
              auto_increment:
                type: integer
                format: int64
                nullable: true
              charset:
                type: string
              has_fk:
                type: boolean
        generated_at:
          type: string
          format: date-time
          description: When the report was assembled (agent or CP wall clock).
    BackupSchedule:
      type: object
      required: [id, tenant_id, site_id, cadence, kind, enabled, retention_days, monthly_archive_keep, run_hour, run_minute, keep_last, incremental_enabled, timezone, gmt_offset, next_run_at, next_runs, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        site_id:
          type: string
          format: uuid
        cadence:
          type: string
          enum: [hourly, every_n_hours, daily, weekly, monthly]
        kind:
          type: string
          enum: [files, db, full]
        enabled:
          type: boolean
        retention_days:
          type: integer
          format: int32
        monthly_archive_keep:
          type: integer
          format: int32
        run_hour:
          type: integer
          format: int32
          minimum: 0
          maximum: 23
          description: Hour of day (0-23) in the site timezone at which the backup fires.
        run_minute:
          type: integer
          format: int32
          minimum: 0
          maximum: 59
          description: Minute (0-59) within the hour at which the backup fires.
        day_of_week:
          type: integer
          format: int32
          minimum: 0
          maximum: 6
          nullable: true
          description: "Day of week (0=Sun..6=Sat) for weekly cadence; null otherwise."
        day_of_month:
          type: integer
          format: int32
          minimum: 1
          maximum: 28
          nullable: true
          description: "Day of month (1-28, capped) for monthly cadence; null otherwise."
        frequency_hours:
          type: integer
          format: int32
          minimum: 1
          maximum: 24
          nullable: true
          description: "Interval in hours for every_n_hours cadence; null otherwise."
        keep_last:
          type: integer
          format: int32
          description: Minimum number of snapshots to retain regardless of age.
        incremental_enabled:
          type: boolean
          description: "Beta. When true, scheduled and run-now backups for this site may take incremental snapshots (the control plane auto-decides full base vs increment per ADR-048)."
        base_window_days:
          type: integer
          format: int32
          minimum: 1
          maximum: 365
          nullable: true
          description: "Optional override of the default incremental base window (7 days). null means use the default."
        timezone:
          type: string
          description: "Read-only. IANA timezone name (or fixed-offset label) resolved from the site's WordPress timezone. Used by the UI to display run times."
        gmt_offset:
          type: number
          description: "Read-only. GMT offset in hours (e.g. 5.5 for +05:30) from the site's WordPress settings."
        next_run_at:
          type: string
          format: date-time
        next_runs:
          type: array
          description: "Read-only. The next ~3 scheduled occurrence times (RFC 3339 UTC) for the upcoming-preview strip in the UI."
          items:
            type: string
            format: date-time
        last_run_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    BackupScheduleUpdate:
      type: object
      description: Create or update a site's backup schedule (daily default).
      properties:
        cadence:
          type: string
          enum: [hourly, every_n_hours, daily, weekly, monthly]
          default: daily
        kind:
          type: string
          enum: [files, db, full]
          default: full
        enabled:
          type: boolean
          default: true
        retention_days:
          type: integer
          format: int32
          description: Rolling-window retention in days. Defaults to the server policy.
        monthly_archive_keep:
          type: integer
          format: int32
          description: Number of monthly-archive snapshots to keep beyond the window.
        run_hour:
          type: integer
          format: int32
          minimum: 0
          maximum: 23
          description: Hour of day (0-23) in the site timezone at which the backup fires.
        run_minute:
          type: integer
          format: int32
          minimum: 0
          maximum: 59
          description: Minute (0-59) within the hour at which the backup fires.
        day_of_week:
          type: integer
          format: int32
          minimum: 0
          maximum: 6
          nullable: true
          description: "Day of week (0=Sun..6=Sat) for weekly cadence; null otherwise."
        day_of_month:
          type: integer
          format: int32
          minimum: 1
          maximum: 28
          nullable: true
          description: "Day of month (1-28, capped) for monthly cadence; null otherwise."
        frequency_hours:
          type: integer
          format: int32
          minimum: 1
          maximum: 24
          nullable: true
          description: "Interval in hours for every_n_hours cadence; null otherwise."
        keep_last:
          type: integer
          format: int32
          description: Minimum number of snapshots to retain regardless of age.
        incremental_enabled:
          type: boolean
          default: false
          description: "Beta. Take incremental backups on this schedule (and via run-now). The control plane auto-decides full base vs increment."
        base_window_days:
          type: integer
          format: int32
          minimum: 1
          maximum: 365
          nullable: true
          description: "Optional override of the default incremental base window (7 days). Omit/null to use the default."
    SiteBackupSettingsContents:
      type: object
      description: |
        Track-A backup scope/exclusion settings for a site (m50). A 404 means
        no settings row exists — safe defaults apply (all components, no exclusions).
      required: [site_id, updated_at]
      properties:
        site_id:
          type: string
          format: uuid
        backup_components:
          type: array
          items:
            type: string
            enum: [plugin, theme, upload, wp-content, db, core]
          nullable: true
          description: |
            Subset of archive components to include. Null/absent means all components (full backup).
            Singular vocabulary matching manifest entry_kind:
            "plugin" (wp-content/plugins/*), "theme" (wp-content/themes/*),
            "upload" (wp-content/uploads/*), "wp-content" (catch-all), "db" (database dump),
            "core" (ABSPATH: wp-admin, wp-includes, root PHP files).
          uniqueItems: true
        include_core:
          type: boolean
          default: false
          description: When true, the WordPress core source root (ABSPATH) is archived.
        exclude_paths:
          type: array
          items:
            type: string
          maxItems: 100
          nullable: true
          description: Path-segment names to exclude from file archiving.
        exclude_extensions:
          type: array
          items:
            type: string
          maxItems: 50
          nullable: true
          description: File extensions to skip (without leading dot, case-insensitive).
        exclude_file_size_mb:
          type: integer
          format: int32
          minimum: 1
          maximum: 102400
          nullable: true
          description: Skip files strictly larger than this value (MiB). 0/null = no filter.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SiteBackupSettingsContentsUpdate:
      type: object
      description: Update the Track-A backup scope/exclusion settings for a site.
      properties:
        backup_components:
          type: array
          items:
            type: string
            enum: [plugin, theme, upload, wp-content, db, core]
          nullable: true
          description: Subset of archive components. Null/absent = all components (full backup).
        include_core:
          type: boolean
        exclude_paths:
          type: array
          items:
            type: string
          maxItems: 100
          nullable: true
        exclude_extensions:
          type: array
          items:
            type: string
          maxItems: 50
          nullable: true
        exclude_file_size_mb:
          type: integer
          format: int32
          minimum: 0
          maximum: 102400
          nullable: true
          description: 0 or null clears the filter.
    SiteBackupSettingsNotifications:
      type: object
      description: |
        Track-B notification settings for a site (m50). A 404 means no settings
        row exists — safe defaults apply (never/empty). Fires for BOTH manual
        and scheduled backup completions/failures.
      required: [site_id, notify_on_completion, updated_at]
      properties:
        site_id:
          type: string
          format: uuid
        notify_on_completion:
          type: string
          enum: [always, on_failure, never]
          default: never
          description: |
            When to send a backup-event email. Fires for both manual and
            scheduled runs. "always" = every completion or failure;
            "on_failure" = only on failure; "never" = no email (default).
        notify_recipients:
          type: array
          items:
            type: string
            format: email
          maxItems: 20
          description: Email addresses to notify. Max 20.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SiteBackupSettingsNotificationsUpdate:
      type: object
      description: Update the Track-B notification settings for a site.
      properties:
        notify_on_completion:
          type: string
          enum: [always, on_failure, never]
        notify_recipients:
          type: array
          items:
            type: string
            format: email
          maxItems: 20
    RestoreRun:
      type: object
      description: |
        A single restore attempt, created when the operator calls
        `POST /backups/{snapshotId}/restore`. The run advances through
        phases as the agent executes the restore; `current_phase` reflects
        the latest phase received from the agent. `triggered_by_email` and
        `triggered_by_name` are resolved from the tenant user directory
        when the actor is a known user; they are `null` for API-key or
        system-triggered restores.
      required:
        - id
        - site_id
        - snapshot_id
        - mode
        - components
        - status
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Unique restore run ID.
        site_id:
          type: string
          format: uuid
          description: ID of the site being restored.
        snapshot_id:
          type: string
          format: uuid
          description: ID of the backup snapshot used as the restore source.
        mode:
          type: string
          description: |
            Restore mode. `full` means all components were requested;
            `partial` means a subset was specified.
          enum: [full, partial]
        components:
          type: array
          description: Which backup components were restored (e.g. `files`, `db`).
          items:
            type: string
            enum: [files, db]
        status:
          type: string
          description: Current status of the restore run.
          enum: [queued, running, completed, failed, rolled_back]
        current_phase:
          type: string
          description: The last phase reported by the agent runner (absent when queued).
        error:
          type: string
          description: Human-readable error message when status is `failed` or `rolled_back`.
        triggered_by:
          type: string
          description: Raw actor identifier (user UUID or `api-key:<id>` or `system`).
        triggered_by_email:
          type: string
          format: email
          nullable: true
          description: Email of the triggering user (null for non-user actors or unresolvable IDs).
        triggered_by_name:
          type: string
          nullable: true
          description: Display name of the triggering user (null for non-user actors or unresolvable IDs).
        created_at:
          type: string
          format: date-time
          description: When the restore run was created.
        started_at:
          type: string
          format: date-time
          description: When the agent began executing the restore (absent until running).
        finished_at:
          type: string
          format: date-time
          description: When the restore run reached a terminal state.
    RestoreRunList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/RestoreRun"
    RestoreRunEvent:
      type: object
      description: A single phase-log entry emitted by the restore engine.
      required: [id, phase, status, occurred_at]
      properties:
        id:
          type: integer
          format: int64
          description: Monotonically increasing event ID (use as cursor for `?after=`).
        phase:
          type: string
          description: The restore phase that produced this event.
        status:
          type: string
          description: Outcome of the phase at the time of this event.
          enum: [started, completed, failed]
        message:
          type: string
          description: Optional human-readable detail from the agent.
        occurred_at:
          type: string
          format: date-time
          description: Wall-clock time at which the event was recorded.
    RestoreRunEventList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/RestoreRunEvent"
    ScheduleRun:
      type: object
      description: |
        A single scheduled-backup fire. Pre-inserted as `scheduled` before
        the run window opens, then advanced to `queued` (dispatched to River),
        `running` (agent executing), and finally a terminal status
        (`completed`, `failed`, `skipped`, or `canceled`).
        `triggered_by_email` and `triggered_by_name` are resolved from the
        tenant user directory when the actor is a known user (schedule-fired
        runs carry `triggered_by="schedule"` and leave these null).
      required:
        - id
        - site_id
        - schedule_id
        - scheduled_for
        - status
        - kind
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Unique schedule run ID.
        site_id:
          type: string
          format: uuid
          description: ID of the site this run targets.
        schedule_id:
          type: string
          format: uuid
          description: ID of the backup schedule that generated this run.
        snapshot_id:
          type: string
          format: uuid
          description: ID of the backup snapshot created by this run (absent until the snapshot is created).
        scheduled_for:
          type: string
          format: date-time
          description: The scheduled fire time for this run.
        status:
          type: string
          description: Current status of the schedule run.
          enum: [scheduled, queued, running, completed, failed, skipped, canceled]
        kind:
          type: string
          description: Backup kind that will be (or was) created by this run.
          enum: [full, incremental]
        error:
          type: string
          description: Human-readable error message when status is `failed`.
        triggered_by:
          type: string
          description: Actor that triggered this run (`schedule` for automatic fires; user UUID for manual).
        triggered_by_email:
          type: string
          format: email
          nullable: true
          description: Email of the triggering user (null for schedule-fired or unresolvable actors).
        triggered_by_name:
          type: string
          nullable: true
          description: Display name of the triggering user (null for schedule-fired or unresolvable actors).
        created_at:
          type: string
          format: date-time
          description: When the schedule run row was created.
        started_at:
          type: string
          format: date-time
          description: When the run transitioned to `running` (absent until then).
        finished_at:
          type: string
          format: date-time
          description: When the run reached a terminal state.
    ScheduleRunList:
      type: object
      description: |
        Split view of schedule runs for a site. `upcoming` contains
        non-terminal runs (bounded to 10); `past` contains terminal runs
        (paginated). One or both lists may be empty.
      required: [upcoming, past]
      properties:
        upcoming:
          type: array
          description: Non-terminal schedule runs (scheduled/queued/running), newest-fire-time first.
          items:
            $ref: "#/components/schemas/ScheduleRun"
        past:
          type: array
          description: Terminal schedule runs (completed/failed/skipped/canceled), newest first.
          items:
            $ref: "#/components/schemas/ScheduleRun"
    UptimeStatus:
      type: object
      description: Windowed uptime status for a single site (from the metrics store).
      required: [site_id, window, uptime_pct, avg_latency_ms, checks, up, series]
      properties:
        site_id:
          type: string
          format: uuid
        window:
          type: string
          enum: ["7d", "30d", "90d"]
        uptime_pct:
          type: number
          format: double
          description: Percentage of checks in the window that were up (0-100).
        avg_latency_ms:
          type: number
          format: double
          description: Mean total request time over the window, in milliseconds.
        checks:
          type: integer
          format: int64
          description: Number of probe checks recorded in the window.
        up:
          type: boolean
          description: Whether the most recent probe classified the site as up.
        last_check:
          type: string
          format: date-time
          description: Time of the most recent probe (absent if never probed).
        tls_expiry:
          type: string
          format: date-time
          description: Leaf TLS certificate expiry from the latest probe (HTTPS only).
        series:
          type: array
          description: Downsampled per-bucket check series over the window.
          items:
            $ref: "#/components/schemas/UptimePoint"
    UptimePoint:
      type: object
      required: [bucket, checks, up_checks, avg_latency_ms]
      properties:
        bucket:
          type: string
          format: date-time
          description: Start of the time bucket.
        checks:
          type: integer
          format: int64
        up_checks:
          type: integer
          format: int64
        avg_latency_ms:
          type: number
          format: double
    UptimeSummary:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/UptimeSummaryItem"
    UptimeSummaryItem:
      type: object
      required: [site_id, up]
      properties:
        site_id:
          type: string
          format: uuid
        up:
          type: boolean
        http_status:
          type: integer
          format: int32
        last_check:
          type: string
          format: date-time
        tls_expiry:
          type: string
          format: date-time
    AlertConfig:
      type: object
      description: |
        A tenant's uptime alert channel. The webhook secret is write-only and is
        never returned; webhook_configured indicates whether a webhook URL is set.
      required: [email_recipients, enabled, webhook_configured]
      properties:
        email_recipients:
          type: array
          items:
            type: string
            format: email
        webhook_url:
          type: string
        webhook_configured:
          type: boolean
        enabled:
          type: boolean
    AlertConfigUpdate:
      type: object
      description: Create or update the tenant's uptime alert channel.
      properties:
        email_recipients:
          type: array
          items:
            type: string
            format: email
        webhook_url:
          type: string
        webhook_secret:
          type: string
          description: Write-only HMAC signing secret for the webhook payload.
        enabled:
          type: boolean
          default: true
    AutologinCreate:
      type: object
      description: |
        Optional inputs for minting an autologin URL. Both fields default to
        empty: an absent `target_wp_user_login` means "agent picks the first
        administrator", and an absent `redirect_to` lands the operator on the
        wp-admin home.
      properties:
        target_wp_user_login:
          type: string
          maxLength: 60
          description: |
            The WordPress username the agent should log the operator in as.
            Empty -> the agent picks the first administrator on the site.
        redirect_to:
          type: string
          maxLength: 2048
          description: |
            Optional URL the agent forwards the operator's browser to after
            establishing the wp-admin session. The agent may rewrite it to a
            same-origin URL.
    AutologinResponse:
      type: object
      required: [redirect_url, expires_at]
      properties:
        redirect_url:
          type: string
          description: |
            The URL the operator's browser should follow. Shape:
            `{site.url}/wp-json/wpmgr/v1/autologin?token=<jwt>&redirect_to=<urlencoded>`.
            The embedded `token` is a single-use Ed25519 JWT bound to the
            target site (`aud` = site UUID, `cmd` = "autologin") with a
            ~60-second TTL. NEVER log or persist this URL — the token is a
            credential.
        expires_at:
          type: string
          format: date-time
          description: When the JWT/nonce expires (~60s from mint).
    AutologinRateLimited:
      type: object
      required: [code, message, retry_after_seconds]
      properties:
        code:
          type: string
          enum: [rate_limited]
        message:
          type: string
        retry_after_seconds:
          type: integer
          format: int32
          description: Smallest seconds to wait before retrying.
    AutologinConsumeRequest:
      type: object
      required: [nonce, site_id]
      properties:
        nonce:
          type: string
          description: |
            The base64url-no-pad nonce id from the JWT's `jti` claim. Single-use.
          minLength: 8
          maxLength: 256
        site_id:
          type: string
          format: uuid
          description: |
            The agent's claimed site_id. MUST equal the site_id derived from
            the agent's verified Ed25519 identity, else the request is
            rejected (`site_mismatch`).
        consumed_from_ip:
          type: string
          description: |
            The IP that initiated the consume (typically the operator's
            browser as seen by the agent). Optional; the control plane falls
            back to the request peer IP when absent.
    AutologinConsumeResponse:
      type: object
      required: [ok, target_wp_user_login, allowed_wp_roles, audit_id]
      properties:
        ok:
          type: boolean
        target_wp_user_login:
          type: string
          description: |
            The WP login the agent should establish a session as. Empty means
            the agent should pick the first administrator (the policy still
            constrains which roles are admissible).
        allowed_wp_roles:
          type: array
          items:
            type: string
          description: |
            The WP roles the agent is permitted to log the operator in as
            (from `autologin_policies.allowed_wp_roles`; defaults to
            ["administrator"] when no policy row exists).
        audit_id:
          type: string
          format: uuid
          description: |
            The audit entry id recorded for the consume; the agent may surface
            it for correlation but it has no security significance.
    # ── ADR-037 Sprint 2 — Site Health (diagnostics) + PHP errors ──────────
    SiteDiagnosticsCard:
      type: object
      required: [category, payload, fresh]
      properties:
        category:
          type: string
          description: |
            One of: identity, php, mysql, filesystem, http, cron, themes,
            plugins, users, security, https, mail, performance, hosting,
            wp_native. The first 14 are the WPMgr-extra leapfrog collector
            (the 9-card legacy grid + the ribbon-summary entries); the 15th
            `wp_native` carries the verbatim WP_Debug_Data::debug_data()
            dump (full Site Health > Info parity) and is rendered as four
            additional cards: Directory Sizes, Media Handling, Filesystem
            Permissions, WordPress Constants.
        payload:
          description: |
            The raw JSON sub-blob the agent shipped for this category, or
            null when the agent has never shipped a payload for it yet.
            Shape is category-specific and deliberately tolerant — the UI
            parses it lazily so the agent can evolve the shape without a
            wire schema change.
        collected_at:
          type: string
          format: date-time
          description: Agent-side collection timestamp (UTC).
        received_at:
          type: string
          format: date-time
          description: CP-side ingestion timestamp (UTC).
        fresh:
          type: boolean
          description: |
            True when the agent's `collected_at` is within the freshness
            tolerance (24h + 2h slack). Card UIs render a stale warning
            badge when false.
    SiteDiagnosticsList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/SiteDiagnosticsCard"
    PHPErrorFrame:
      type: object
      description: One frame in a PHP error backtrace (most-recent-call-first).
      required:
        - file
        - line
        - function
      properties:
        file:
          type: string
          description: Absolute path to the PHP file containing the call.
        line:
          type: integer
          description: Line number of the call site.
        function:
          type: string
          description: Function or method name at this frame (empty string for file-level code).
    PHPError:
      type: object
      required:
        - id
        - md5
        - code
        - severity
        - message
        - file
        - line
        - request_path
        - first_seen_at
        - last_seen_at
        - occurrence_count
        - silenced
        - backtrace
      properties:
        id:
          type: string
          description: The CP-side row UUID (stringified).
        md5:
          type: string
          description: The agent-side dedup fingerprint (md5(code:file:line:message)).
        code:
          type: integer
          description: PHP error code (E_* constant value).
        severity:
          type: string
          description: One of fatal, warning, notice, deprecated, bootstrap, unknown.
        message:
          type: string
        file:
          type: string
        line:
          type: integer
        request_path:
          type: string
        first_seen_at:
          type: string
          format: date-time
        last_seen_at:
          type: string
          format: date-time
        occurrence_count:
          type: integer
          format: int64
        silenced:
          type: boolean
        backtrace:
          type: array
          description: >
            Up to 10 stack frames captured at the error site, most-recent-call-first.
            Always present; may be an empty array for errors captured before S1.1
            or when the agent could not produce a trace.
          items:
            $ref: "#/components/schemas/PHPErrorFrame"
    PHPErrorList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/PHPError"
        next_cursor: { type: string }
    PHPErrorSilence:
      type: object
      properties:
        silenced:
          type: boolean
          default: true
          description: Whether to silence (default true).
    # ── S1.2 PHP-error ignore-list + error-level config ────────────────────
    SiteErrorConfig:
      type: object
      required:
        - error_level
        - ignore_md5s
      properties:
        error_level:
          type: integer
          format: int32
          description: |
            PHP E_* bitmask the agent applies to wp_debug_log collection.
            Default 6143 = E_ALL & ~E_STRICT (WordPress default).
        ignore_md5s:
          type: array
          description: |
            Ordered list of 32-character lowercase hex md5 fingerprints
            (md5(code:file:line:message)) the agent must suppress without
            counting or reporting. An empty list clears all suppression.
          items:
            type: string
    SiteErrorConfigUpdate:
      type: object
      required:
        - error_level
        - ignore_md5s
      properties:
        error_level:
          type: integer
          format: int32
          description: |
            PHP E_* bitmask to apply. Must be >0 and fit in int32.
        ignore_md5s:
          type: array
          description: |
            Full canonical ignore-list (replaces the stored list atomically).
            Each entry must be exactly 32 lowercase hex characters.
          items:
            type: string
    # ── ADR-037 Sprint 3 — WordPress activity log ──────────────────────────
    SiteActivityEvent:
      type: object
      required:
        - id
        - seq
        - event_type
        - object_type
        - object_id
        - object_label
        - actor_user_id
        - actor_login
        - actor_ip
        - summary
        - meta
        - severity
        - prev_hash
        - this_hash
        - chain_valid
        - occurred_at
        - received_at
      properties:
        id:
          type: string
          description: The CP-side row id (stringified BIGSERIAL).
        seq:
          type: integer
          format: int64
          description: Agent-assigned monotonic sequence within the chain.
        event_type:
          type: string
        object_type:
          type: string
        object_id:
          type: string
        object_label:
          type: string
        actor_user_id:
          type: integer
          format: int64
          description: WP user id of the actor; 0 for system events.
        actor_login:
          type: string
          description: WP login of the actor; empty for system events.
        actor_ip:
          type: string
        summary:
          type: string
        meta:
          type: object
          additionalProperties: true
          description: Agent-supplied event metadata (severity lives here).
        severity:
          type: string
          enum: [high, medium, low]
        prev_hash:
          type: string
          description: The prior link's hash (64 zero chars at genesis).
        this_hash:
          type: string
          description: sha256 over the canonical event preimage.
        chain_valid:
          type: boolean
          description: |
            Server-verified at ingest. False marks a tampered/broken link: the
            CP-recomputed hash did not match the shipped this_hash, or the
            shipped prev_hash did not match the prior stored row.
        occurred_at:
          type: string
          format: date-time
        received_at:
          type: string
          format: date-time
    SiteActivityList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/SiteActivityEvent"
        next_cursor: { type: string }
    ActivityVerifyResult:
      type: object
      required: [valid, total]
      properties:
        valid:
          type: boolean
          description: True when the entire chain re-verifies intact.
        break_at_seq:
          type: integer
          format: int64
          nullable: true
          description: |
            The seq of the first broken link, or null when the chain is intact.
        total:
          type: integer
          description: Total number of events folded during verification.
    # ── S2 — Login Protection + IP store ───────────────────────────────────
    SecurityThresholds:
      type: object
      required:
        - captcha_limit
        - temp_block_limit
        - block_all_limit
        - failed_login_gap
        - success_login_gap
        - all_blocked_gap
      properties:
        captcha_limit:
          type: integer
          format: int32
          description: Number of failures before a CAPTCHA challenge is shown.
        temp_block_limit:
          type: integer
          format: int32
          description: Number of failures before a temporary block is applied.
        block_all_limit:
          type: integer
          format: int32
          description: Number of failures before a permanent block is applied.
        failed_login_gap:
          type: integer
          format: int32
          description: |
            Seconds of inactivity that reset the failure counter.
        success_login_gap:
          type: integer
          format: int32
          description: |
            Seconds after a successful login before a new failure series begins.
        all_blocked_gap:
          type: integer
          format: int32
          description: Seconds a permanent block remains active.
    SiteLoginProtectionConfig:
      type: object
      required:
        - mode
        - thresholds
        - ip_header
        - allow_cidrs
        - deny_cidrs
      properties:
        mode:
          type: string
          enum: [disabled, audit, protect]
          description: |
            Login protection mode:
              - `disabled` — no login protection active.
              - `audit` — record events but do not block.
              - `protect` — record events AND block based on thresholds.
        thresholds:
          $ref: "#/components/schemas/SecurityThresholds"
        ip_header:
          type: string
          description: |
            HTTP header the agent reads to extract the real client IP (e.g.
            `REMOTE_ADDR`, `HTTP_X_FORWARDED_FOR`).
        allow_cidrs:
          type: array
          description: |
            CIDRs that always bypass all checks (IPv4 or IPv6, with prefix length).
          items:
            type: string
        deny_cidrs:
          type: array
          description: |
            CIDRs that are always denied before threshold evaluation.
          items:
            type: string
        updated_at:
          type: string
          format: date-time
          description: When the config was last saved. Absent for the built-in default.
    SiteLoginProtectionConfigUpdate:
      type: object
      required:
        - mode
        - thresholds
        - ip_header
        - allow_cidrs
        - deny_cidrs
      properties:
        mode:
          type: string
          enum: [disabled, audit, protect]
          description: Login protection mode.
        thresholds:
          $ref: "#/components/schemas/SecurityThresholds"
        ip_header:
          type: string
          description: HTTP header the agent reads for the real client IP.
        allow_cidrs:
          type: array
          description: |
            CIDRs always allowed. Empty = no static allowlist. When mode=protect
            and this list is empty the CP auto-adds the operator's IP (/32 or /128).
          items:
            type: string
        deny_cidrs:
          type: array
          description: CIDRs always denied before threshold evaluation. Empty = none.
          items:
            type: string
    UnblockIPRequest:
      type: object
      required: [ip]
      properties:
        ip:
          type: string
          description: The IPv4 or IPv6 address to unblock.
    UnblockIPResult:
      type: object
      required: [ok, detail]
      properties:
        ok:
          type: boolean
          description: Whether the agent successfully removed the block.
        detail:
          type: string
          description: Short human-readable note from the agent.
    SiteLoginEvent:
      type: object
      required:
        - id
        - agent_event_id
        - ip
        - status
        - category
        - username
        - request_id
        - occurred_at
        - ingested_at
      properties:
        id:
          type: integer
          format: int64
          description: CP-side row id (BIGSERIAL).
        agent_event_id:
          type: integer
          format: int64
          description: Agent-side event id (cursor tracking).
        ip:
          type: string
          description: Client IP address.
        status:
          type: integer
          format: int32
          enum: [1, 2, 3]
          description: "1=failure, 2=success, 3=blocked."
        category:
          type: string
          description: Agent-assigned event category.
        username:
          type: string
          description: Attempted username.
        request_id:
          type: string
          description: Agent-side request id for correlation.
        occurred_at:
          type: string
          format: date-time
        ingested_at:
          type: string
          format: date-time
    SiteLoginEventList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/SiteLoginEvent"
    # ── M14 Login Whitelabel ─────────────────────────────────────────────────
    SiteLoginBrand:
      type: object
      required:
        - logo_url
        - logo_link
        - message
      properties:
        logo_url:
          type: string
          description: |
            Full URL of the image shown on the WP login page. Empty string
            means no override (WordPress default logo is used).
        logo_link:
          type: string
          description: |
            URL the logo links to on the login page. Empty string means no
            override (WordPress default link is used).
        message:
          type: string
          description: |
            Text shown below the logo on the login page. Empty string means
            no custom message. Maximum 2000 characters.
        updated_at:
          type: string
          format: date-time
          description: When the config was last saved. Absent for the built-in default.
    SiteLoginBrandUpdate:
      type: object
      required:
        - logo_url
        - logo_link
        - message
      properties:
        logo_url:
          type: string
          description: |
            Full http/https URL of the login logo image, or `""` to clear.
        logo_link:
          type: string
          description: |
            http/https URL the login logo links to, or `""` to clear.
        message:
          type: string
          description: |
            Text shown below the login logo (max 2000 chars), or `""` to clear.
    # ── M5.7 — Orgs + per-site sharing + invitations ────────────────────────
    PatchMemberRequest:
      type: object
      required: [role]
      properties:
        role:
          $ref: "#/components/schemas/Role"
    CreateOrgRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
          description: Display name of the new organisation.
        slug:
          type: string
          maxLength: 64
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
          description: |
            URL-safe slug. Auto-derived from name when omitted.
    Org:
      type: object
      required: [id, name, slug]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
    ActivateOrgResponse:
      type: object
      required: [active_tenant_id]
      properties:
        active_tenant_id:
          type: string
          format: uuid
    SiteShareRole:
      type: string
      enum: [viewer, operator, admin]
      description: |
        Role a site collaborator holds. Subset of the full org Role enum —
        site shares cannot be owner.
    SiteShare:
      type: object
      required: [id, site_id, user_id, role, created_at]
      properties:
        id:
          type: string
          format: uuid
        site_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/SiteShareRole"
        granted_by:
          type: string
          format: uuid
          description: UUID of the org member who created the share.
        expires_at:
          type: string
          format: date-time
          description: |
            When the share expires (null = durable). After this time the
            RESTRICTIVE RLS policy treats the grant as absent.
        created_at:
          type: string
          format: date-time
    SiteShareList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/SiteShare"
    CreateSiteShareRequest:
      type: object
      required: [email, role]
      properties:
        email:
          type: string
          format: email
          description: |
            Email of the collaborator to invite. If a user with this email exists
            the share is created immediately; otherwise an invitation is emailed/linked.
        role:
          $ref: "#/components/schemas/SiteShareRole"
        expires_at:
          type: string
          format: date-time
          description: |
            Optional expiry (RFC3339). Null / omitted = durable grant. Use for
            time-limited support access.
    SiteShareGrantResponse:
      type: object
      required: [invited]
      properties:
        share:
          $ref: "#/components/schemas/SiteShare"
          description: Present when the user already existed and the share is immediate.
        invited:
          type: boolean
          description: |
            true when an invitation was created because the email is not a known
            user; false when the share was applied directly.
        accept_link:
          type: string
          description: |
            The raw invitation accept URL (shown once, like an API key). Present
            when invited=true AND the notification SMTP is not configured — the
            inviter must copy and share this link manually.
    AcceptInvitationRequest:
      type: object
      required: [token, email]
      properties:
        token:
          type: string
          description: The raw token from the accept link (?token=…).
        email:
          type: string
          format: email
          description: |
            Must match the email the invitation was addressed to (prevents
            identity swap and enumeration).
        name:
          type: string
          maxLength: 200
          description: Display name to set when a new user account is created.
        password:
          type: string
          minLength: 8
          maxLength: 200
          description: |
            Password to set when a new user account is created. Required only
            when the invited email has no existing account.
    AcceptInvitationResponse:
      type: object
      required: [tenant_id, scope]
      properties:
        tenant_id:
          type: string
          format: uuid
          description: The organisation the invitation belonged to.
        scope:
          type: string
          enum: [org, site]
          description: |
            "org" when a full membership was granted; "site" when a site-scoped
            share was created.
        site_id:
          type: string
          format: uuid
          description: Set when scope="site"; the specific site the user now has access to.

    # ----------------------------------------------------------------------
    # Media Optimizer (ADR-043, M23). DTOs are hand-rolled in the Go handler
    # (c.JSON), mirroring the scan feature; these schemas document the wire
    # shape for the generated TS client.
    # ----------------------------------------------------------------------
    MediaAsset:
      type: object
      properties:
        id: { type: string, format: uuid }
        site_id: { type: string, format: uuid }
        wp_attachment_id: { type: integer, format: int64 }
        title: { type: string }
        original_url: { type: string }
        original_mime: { type: string }
        original_size_bytes: { type: integer, format: int64 }
        current_format: { type: string, enum: [original, webp, avif] }
        current_size_bytes: { type: integer, format: int64 }
        status:
          type: string
          enum: [pending, optimizing, optimized, failed, restoring, restored, excluded, originals_deleted]
        generation: { type: integer }
        sizes_optimized: { type: array, items: { type: string } }
        sizes_unoptimized: { type: object, additionalProperties: { type: string } }
        last_optimized_at: { type: string, format: date-time }
    MediaSummary:
      type: object
      properties:
        total: { type: integer, format: int64 }
        optimized: { type: integer, format: int64 }
        pending: { type: integer, format: int64 }
        failed: { type: integer, format: int64 }
        bytes_saved: { type: integer, format: int64 }
    MediaAssetList:
      type: object
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/MediaAsset" } }
        next_cursor: { type: string }
        total_count: { type: integer, format: int64 }
        summary: { $ref: "#/components/schemas/MediaSummary" }
    MediaOptimizeRequest:
      type: object
      properties:
        asset_ids: { type: array, items: { type: string, format: uuid } }
        all_pending: { type: boolean }
        target_format: { type: string, enum: [avif, webp, original] }
        target_quality: { type: string, enum: [lossy, lossless] }
    MediaAssetSelection:
      type: object
      properties:
        asset_ids: { type: array, items: { type: string, format: uuid } }
    MediaBatchResult:
      type: object
      properties:
        batch_job_id: { type: string }
        queued_count: { type: integer }
    MediaJob:
      type: object
      properties:
        id: { type: string }
        site_id: { type: string, format: uuid }
        asset_id: { type: string, format: uuid }
        wp_attachment_id: { type: integer, format: int64 }
        kind: { type: string, enum: [optimize, restore, delete_originals, sync] }
        target_format: { type: string }
        target_quality: { type: string }
        state:
          type: string
          enum: [queued, in_progress, succeeded, partially_succeeded, failed, cancelled]
        bytes_before: { type: integer, format: int64 }
        bytes_after: { type: integer, format: int64 }
        variants_total: { type: integer }
        variants_succeeded: { type: integer }
        variants_failed: { type: integer }
        error_reason: { type: string }
        created_at: { type: string, format: date-time }
        started_at: { type: string, format: date-time }
        completed_at: { type: string, format: date-time }
    MediaVariantResult:
      type: object
      properties:
        variant_name: { type: string }
        source_size_bytes: { type: integer, format: int64 }
        optimized_size_bytes: { type: integer, format: int64 }
        source_mime: { type: string }
        optimized_mime: { type: string }
        encode_ms: { type: integer }
        state: { type: string, enum: [succeeded, failed, skipped] }
        reason: { type: string }
    MediaJobList:
      type: object
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/MediaJob" } }
        next_cursor: { type: string }
    MediaJobDetail:
      allOf:
        - $ref: "#/components/schemas/MediaJob"
        - type: object
          properties:
            variants: { type: array, items: { $ref: "#/components/schemas/MediaVariantResult" } }

    # --- Performance Suite (ADR-046 / m36) ------------------------------------
    # These mirror the hand-rolled Go DTOs in apps/api/internal/perf/dto.go.
    CdnCredentials:
      type: object
      description: |
        Write-only CDN credentials. Accepted on PUT /perf/config and NEVER
        returned by GET (the control plane decrypts server-side only).
      required: [api_token]
      properties:
        api_token: { type: string }
        zone_id: { type: string }
        zone: { type: string }
    PerfConfig:
      type: object
      description: |
        The full per-site performance configuration. `cdn_credentials` is
        write-only (see CdnCredentials); `cdn_has_credentials` and the
        install-state fields (`server_software`, `dropin_installed`,
        `wp_cache_constant_set`, `htaccess_managed`) are read-only / server- or
        agent-derived.
      properties:
        # Caching
        cache_enabled: { type: boolean }
        cache_logged_in: { type: boolean }
        cache_mobile: { type: boolean }
        cache_refresh: { type: boolean }
        cache_refresh_interval: { type: string }
        cache_link_prefetch: { type: boolean }
        cache_bypass_urls: { type: array, items: { type: string } }
        cache_bypass_cookies: { type: array, items: { type: string } }
        cache_include_queries: { type: array, items: { type: string } }
        cache_include_cookies: { type: array, items: { type: string } }
        # Preload (cache-warm) throttle (M37) — operator-tunable queue drain knobs.
        preload_concurrency: { type: integer, minimum: 1, maximum: 4, default: 1 }
        preload_delay_ms: { type: integer, minimum: 0, maximum: 10000, default: 500 }
        preload_batch_size: { type: integer, minimum: 1, maximum: 500, default: 50 }
        preload_max_load: { type: number, format: float, minimum: 0, maximum: 64, default: 0 }
        # CSS / JS
        css_js_minify: { type: boolean }
        css_rucss: { type: boolean }
        css_rucss_include_selectors: { type: array, items: { type: string } }
        css_js_self_host_third_party: { type: boolean }
        js_delay: { type: boolean }
        js_delay_method: { type: string }
        js_delay_excludes: { type: array, items: { type: string } }
        js_delay_third_party: { type: boolean }
        js_delay_third_party_excludes: { type: array, items: { type: string } }
        # Fonts
        fonts_display_swap: { type: boolean }
        fonts_optimize_google: { type: boolean }
        fonts_preload: { type: boolean }
        fonts_transcode_woff2:
          type: boolean
          description: >
            Enable server-side TTF/OTF/WOFF → WOFF2 transcoding for
            self-hosted fonts. When true the agent requests transcode jobs from
            the CP; the CP enqueues a font_transcode River job which produces
            the WOFF2 in object storage. Default false.
        # Media / lazy-load
        lazy_load: { type: boolean }
        lazy_load_exclusions: { type: array, items: { type: string } }
        properly_size_images: { type: boolean }
        youtube_placeholder: { type: boolean }
        self_host_gravatars: { type: boolean }
        # CDN
        cdn_enabled: { type: boolean }
        cdn_url: { type: string }
        cdn_file_types: { type: string }
        cdn_provider: { type: string }
        cdn_has_credentials: { type: boolean, readOnly: true }
        cdn_credentials:
          allOf: [{ $ref: "#/components/schemas/CdnCredentials" }]
          writeOnly: true
        # Database cleanup
        db_auto_clean: { type: boolean }
        db_auto_clean_interval: { type: string }
        db_post_revisions: { type: boolean }
        db_post_auto_drafts: { type: boolean }
        db_post_trashed: { type: boolean }
        db_comments_spam: { type: boolean }
        db_comments_trashed: { type: boolean }
        db_transients_expired: { type: boolean }
        db_optimize_tables: { type: boolean }
        # Bloat removal
        bloat_disable_block_css: { type: boolean }
        bloat_disable_dashicons: { type: boolean }
        bloat_disable_emojis: { type: boolean }
        bloat_disable_jquery_migrate: { type: boolean }
        bloat_disable_xml_rpc: { type: boolean }
        bloat_disable_rss_feed: { type: boolean }
        bloat_disable_oembeds: { type: boolean }
        bloat_heartbeat_control: { type: boolean }
        bloat_post_revisions_control: { type: boolean }
        # Server / install state (read-only, agent-reported)
        server_software: { type: string, readOnly: true }
        dropin_installed: { type: boolean, readOnly: true }
        wp_cache_constant_set: { type: boolean, readOnly: true }
        htaccess_managed: { type: boolean, readOnly: true }
        # WooCommerce cacheable-session (M53 / #169)
        woo_cacheable_session:
          type: boolean
          default: false
          description: |
            When true the agent will cache the WooCommerce catalog shell for
            anonymous shoppers who have an active cart. The agent additionally
            hard-gates on its own theme probe (`woo_theme_fragments_supported`)
            before serving cached pages to cart-holding visitors, providing a
            defense-in-depth layer independent of this flag.
            The API accepts `woo_cacheable_session: true` even when
            `woo_theme_fragments_supported` is false — the agent will not act on
            it until its own probe passes. This allows operators to pre-enable the
            flag before the agent performs its first probe.
        woo_theme_fragments_supported:
          type: boolean
          readOnly: true
          default: false
          description: |
            Agent-reported (read-only). Set to true by the agent after it probes
            the site's active theme and confirms WooCommerce fragment-refresh
            compatibility (wc_ajax_get_refreshed_fragments hook availability).
            The CP stores this value but never lets an operator write it via PUT.
            Old agents that pre-date M53 will leave this field false.
        config_version: { type: integer, readOnly: true }
        updated_at: { type: string, format: date-time, readOnly: true }
    CacheStats:
      type: object
      description: The latest cache gauges the agent reported for a site.
      properties:
        cached_pages_count: { type: integer }
        cache_size_bytes: { type: integer, format: int64 }
        last_purged_at: { type: string, format: date-time }
        last_purge_kind: { type: string }
        last_preload_at: { type: string, format: date-time }
        preload_pending: { type: integer }
        preload_total: { type: integer }
        reported_at: { type: string, format: date-time }
    PurgeRequest:
      type: object
      description: A page-cache purge request.
      required: [scope]
      properties:
        scope:
          type: string
          enum: [all, url]
          description: Purge the whole cache (`all`) or a single URL (`url`).
        url:
          type: string
          description: The single URL to purge when `scope` is `url`.
        urls:
          type: array
          items: { type: string }
          description: Additional URLs to purge.
        delete_everything:
          type: boolean
          description: |
            With `scope: all`, also clears every cached artifact. Requires the
            `site.cache.delete-everything` permission.
    PerfActionResult:
      type: object
      description: |
        The `{ok, detail}` acknowledgement returned by the cache action
        endpoints (purge / preload / enable / disable). `ok` is false when the
        agent rejected the action (still HTTP 200).
      required: [ok]
      properties:
        ok: { type: boolean }
        detail: { type: string }
        purge_id: { type: string, format: uuid }
    DbScanTableInventoryRow:
      type: object
      description: |
        One row in the per-table inventory returned by the db_scan agent command
        (Phase 2.1). Ownership is classified locally on the agent using the WP
        core table list + active plugin/theme slugs; no cloud lookup is performed.
      required: [name, rows, size_bytes, engine, overhead_bytes, belongs_to, owner_type]
      properties:
        name:
          type: string
          description: Full table name including the wp_ prefix (e.g. "wp_posts").
        rows:
          type: integer
          format: int64
          description: |
            TABLE_ROWS from information_schema. An estimate for InnoDB tables
            (can be 40-50% off); exact for MyISAM/ARIA. Rendered with a "~"
            prefix in the UI to signal InnoDB estimate.
        size_bytes:
          type: integer
          format: int64
          description: DATA_LENGTH + INDEX_LENGTH in bytes.
        engine:
          type: string
          description: Storage engine (e.g. "InnoDB", "MyISAM").
        overhead_bytes:
          type: integer
          format: int64
          description: DATA_FREE in bytes (reclaimable fragmented space; often 0 for InnoDB).
        belongs_to:
          type: string
          description: |
            Human-readable ownership label: "WordPress core", an active plugin
            display name (e.g. "WooCommerce"), an active theme display name
            (e.g. "Astra"), or "Orphan".
        owner_type:
          type: string
          enum: [core, plugin, theme, orphan, unknown]
          description: |
            Machine-readable ownership category used for client-side filtering.
            "unknown" is reserved for forward-compat and should not appear in
            Phase 2.1 results.
    DbScanResult:
      type: object
      description: |
        The latest db_scan result for a site, as stored by the control plane
        after the agent's synchronous ACK. Includes both the per-category
        counts/bytes preview and the full per-table inventory (Phase 2.1).
      required: [job_id, db_size_bytes, table_count, scanned_at, created_at]
      properties:
        job_id:
          type: string
          description: Correlation ID for this scan run.
        categories:
          type: object
          description: Per-category count/bytes map (keyed by category id).
          additionalProperties: true
        tables:
          type: array
          description: |
            Full per-table inventory. Sorted by size_bytes DESC (largest first)
            when returned from the agent. Client-side pagination (25 rows/page)
            and filtering (All / WP Core / Plugins / Themes / Orphans) are
            applied in the browser.
          items:
            $ref: "#/components/schemas/DbScanTableInventoryRow"
        db_size_bytes:
          type: integer
          format: int64
          description: Total database size in bytes at scan time.
        table_count:
          type: integer
          description: Number of tables at scan time.
        scanned_at:
          type: integer
          format: int64
          description: Unix timestamp (seconds) when the agent performed the scan.
        created_at:
          type: integer
          format: int64
          description: Unix timestamp (seconds) when the control plane persisted this result.
    SearchReplaceRequest:
      type: object
      description: |
        Request body for the serialization-safe database search-replace command.
        Call with `dry_run: true` first to preview affected rows before applying.
      required: [search, replace, dry_run]
      properties:
        search:
          type: string
          minLength: 3
          description: |
            Exact string to find in the database. Minimum 3 bytes. Treated as a
            literal (no regex, no wildcards).
        replace:
          type: string
          description: Replacement string. May be empty to remove occurrences.
        dry_run:
          type: boolean
          description: |
            When `true` (required for the preview step) the agent scans and
            counts matching rows but writes nothing. `rows_changed` will be 0.
        tables:
          type: array
          items: { type: string }
          description: |
            Optional allowlist of full table names to scan (including the wp_
            prefix, e.g. `wp_options`). When absent every eligible table is
            scanned.
    SearchReplaceResult:
      type: object
      description: |
        Result of a serialization-safe search-replace run or dry-run preview.
      required: [ok, tables_scanned, rows_matched, rows_changed, dry_run]
      properties:
        ok: { type: boolean }
        job_id: { type: string }
        dry_run:
          type: boolean
          description: Echoes the `dry_run` flag from the request.
        tables_scanned:
          type: integer
          description: Number of tables the agent walked (after denylist filtering).
        rows_matched:
          type: integer
          description: |
            Rows where at least one column value would change (or did change on
            a live run). This is the preview count shown before applying.
        rows_changed:
          type: integer
          description: |
            Rows actually written. Always 0 when `dry_run` was true.
        backup_warning:
          type: string
          description: |
            Non-empty when no recent backup was found and `dry_run` was false.
            Advisory only — the replace still ran.
        detail:
          type: string
          description: Human-readable reason on failure (ok=false).
    DbSnapshotEntry:
      type: object
      description: One local database snapshot entry.
      required: [id, label, created_at, size, table_count]
      properties:
        id:
          type: string
          description: Unique snapshot identifier (snap_<hex>).
        label:
          type: string
          description: Operator-supplied label; may be empty.
        created_at:
          type: integer
          format: int64
          description: Unix timestamp (seconds) when the snapshot was created.
        size:
          type: integer
          format: int64
          description: Compressed SQL file size in bytes.
        table_count:
          type: integer
          description: Number of database tables captured.
    DbSnapshotList:
      type: object
      required: [ok, snapshots]
      properties:
        ok: { type: boolean }
        snapshots:
          type: array
          items:
            $ref: "#/components/schemas/DbSnapshotEntry"
        detail:
          type: string
          description: Present on error (ok=false).
    DbSnapshotCreate:
      type: object
      description: Request body for creating a local database snapshot.
      properties:
        label:
          type: string
          maxLength: 120
          description: Optional human-readable label for the snapshot.
        retention:
          type: integer
          minimum: 1
          maximum: 20
          description: Maximum snapshots to retain after this one (default 5).
    DbSnapshotCreateResult:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }
        snapshot:
          $ref: "#/components/schemas/DbSnapshotEntry"
        detail:
          type: string
    DbSnapshotRevert:
      type: object
      required: [confirm]
      description: |
        Request body for the DESTRUCTIVE revert operation.
        `confirm` MUST equal `"REVERT"` exactly.
      properties:
        confirm:
          type: string
          description: Must be the exact string "REVERT".
        skip_safety_snapshot:
          type: boolean
          description: |
            When true, suppresses the automatic safety snapshot taken before
            the import. Defaults to false (safety snapshot is taken).
    DbSnapshotRevertResult:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }
        detail:
          type: string
          description: Human-readable outcome.
        safety_id:
          type: string
          description: |
            ID of the auto-safety snapshot taken before the import.
            Empty string when the safety snapshot was skipped or failed.
    DbCleanResult:
      type: object
      description: The acknowledgement returned by the database-cleanup endpoint.
      required: [ok]
      properties:
        ok: { type: boolean }
        detail: { type: string }
        rows_cleaned: { type: integer }
    RucssResult:
      type: object
      description: One cached Used-CSS (RUCSS) result row.
      properties:
        id: { type: string }
        structure_hash: { type: string }
        url: { type: string }
        original_css_bytes: { type: integer }
        used_css_bytes: { type: integer }
        reduction_pct: { type: number, format: double }
        used_css_s3_key: { type: string }
        last_used_at: { type: string, format: date-time }
    RucssResultList:
      type: object
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/RucssResult" }
    RucssClearResult:
      type: object
      required: [ok, cleared]
      properties:
        ok: { type: boolean }
        cleared: { type: integer }
    BulkPurgeRequest:
      type: object
      required: [site_ids]
      properties:
        site_ids:
          type: array
          items: { type: string, format: uuid }
    BulkConfigRequest:
      type: object
      required: [site_ids, preset]
      properties:
        site_ids:
          type: array
          items: { type: string, format: uuid }
        preset:
          type: string
          enum: [safe, balanced, aggressive]
    BulkResult:
      type: object
      description: One per-site result in a portfolio bulk-cache response.
      required: [site_id, ok, detail]
      properties:
        site_id: { type: string }
        ok: { type: boolean }
        detail: { type: string }
        config_version: { type: integer }
    BulkResultList:
      type: object
      properties:
        results:
          type: array
          items: { $ref: "#/components/schemas/BulkResult" }
    MediaCleanCandidate:
      type: object
      description: One attachment candidate identified as potentially unused.
      required: [id, title, url, file_size, sizes_count]
      properties:
        id:
          type: integer
          format: int64
          description: WordPress attachment post ID.
        title:
          type: string
          description: Attachment post title (may be the filename when no title is set).
        url:
          type: string
          description: Public URL of the original (largest) file (guid).
        thumb:
          type: string
          nullable: true
          description: URL of the thumbnail-size variant; null when unavailable.
        file_size:
          type: integer
          format: int64
          description: Size of the original file in bytes. 0 when the file is missing from disk.
        sizes_count:
          type: integer
          description: Number of generated thumbnail/resize variants registered in attachment metadata.
    MediaCleanScanResult:
      type: object
      required: [ok, total, candidates, truncated]
      properties:
        ok:
          type: boolean
        total:
          type: integer
          description: >
            Full unused-candidate count (capped at SCAN_MAX=500). Use this value
            to drive client-side pagination of the candidates array.
        candidates:
          type: array
          items: { $ref: "#/components/schemas/MediaCleanCandidate" }
          description: >
            Unused attachment candidates sliced by the requested offset/limit.
            The client should fetch once with offset=0 and limit=SCAN_MAX and
            paginate the returned array client-side.
        truncated:
          type: boolean
          description: >
            True when the library has more unused attachments than SCAN_MAX.
            The returned candidates and total are capped at SCAN_MAX.
        detail:
          type: string
          description: Human-readable error message when ok=false.
    MediaCleanIsolateRequest:
      type: object
      required: [job_id, attachment_ids]
      properties:
        job_id:
          type: string
          description: >
            Client-minted UUID v4 for idempotency. The agent echoes it in the
            response for correlation. Generate a new UUID per request.
        attachment_ids:
          type: array
          items: { type: integer, format: int64 }
          description: >
            Attachment IDs to move to quarantine. Maximum 200 per call.
            Must be attachments that appeared in a recent scan result.
    MediaCleanIsolateResult:
      type: object
      required: [ok, job_id, moved, manifest_id]
      properties:
        ok:
          type: boolean
        job_id:
          type: string
          description: Echoed from the request for correlation.
        moved:
          type: integer
          description: Number of attachment file sets moved to quarantine.
        manifest_id:
          type: string
          description: >
            Opaque quarantine manifest identifier. Store this value and pass it
            back in quarantine_ids for restore or delete calls.
        detail:
          type: string
    MediaCleanRestoreRequest:
      type: object
      required: [job_id, quarantine_ids]
      properties:
        job_id:
          type: string
          description: Client-minted UUID v4 for idempotency.
        quarantine_ids:
          type: array
          items: { type: string }
          description: >
            Quarantine manifest IDs to restore. Each ID was returned by a prior
            isolate call as manifest_id. Maximum 200 per call.
    MediaCleanRestoreResult:
      type: object
      required: [ok, job_id, restored]
      properties:
        ok:
          type: boolean
        job_id:
          type: string
          description: Echoed from the request.
        restored:
          type: integer
          description: Number of manifest entries successfully restored to the uploads directory.
        detail:
          type: string
    MediaCleanDeleteRequest:
      type: object
      required: [job_id, quarantine_ids, confirm]
      properties:
        job_id:
          type: string
          description: Client-minted UUID v4 for idempotency.
        quarantine_ids:
          type: array
          items: { type: string }
          description: >
            Quarantine manifest IDs to permanently delete. Maximum 200 per call.
        confirm:
          type: string
          description: Must equal "DELETE" exactly. The agent enforces this independently via hash_equals.
    MediaCleanDeleteResult:
      type: object
      required: [ok, job_id, deleted]
      properties:
        ok:
          type: boolean
        job_id:
          type: string
          description: Echoed from the request.
        deleted:
          type: integer
          description: Number of manifest entries permanently removed from disk.
        detail:
          type: string
    MediaCleanQuarantineEntry:
      type: object
      description: One attachment record inside a quarantine manifest.
      required: [attachment_id, title, file_count]
      properties:
        attachment_id:
          type: integer
          format: int64
          description: WordPress attachment post ID.
        title:
          type: string
          description: Attachment post title.
        file_count:
          type: integer
          description: Number of physical files (original + generated sizes) held in quarantine.
    MediaCleanQuarantineManifest:
      type: object
      description: One quarantine manifest created by a prior isolate call.
      required: [manifest_id, job_id, isolated_at, total_files, entries]
      properties:
        manifest_id:
          type: string
          description: Opaque quarantine manifest identifier. Pass in quarantine_ids for restore/delete calls.
        job_id:
          type: string
          description: Echoed job_id from the isolate request that created this manifest.
        isolated_at:
          type: integer
          format: int64
          description: Unix timestamp (seconds) when the manifest was created.
        total_files:
          type: integer
          description: Total number of physical files held across all entries in this manifest.
        entries:
          type: array
          items: { $ref: "#/components/schemas/MediaCleanQuarantineEntry" }
          description: Per-attachment entries in this manifest.
    MediaCleanQuarantineList:
      type: object
      description: Response body for the list-quarantined-media endpoint.
      required: [ok, manifests]
      properties:
        ok:
          type: boolean
        manifests:
          type: array
          items: { $ref: "#/components/schemas/MediaCleanQuarantineManifest" }
          description: All quarantine manifests currently held on the site.
