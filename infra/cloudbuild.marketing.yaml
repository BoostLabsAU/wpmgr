# Reusable Cloud Build config for the WPMgr marketing (Next.js) image.
#
# Next.js standalone output is version-agnostic (no stamped version string like
# the api binary), so we tag the image by SHA/version for traceability but do
# not inject a BUILD_VERSION arg.
#
#   gcloud builds submit --config infra/cloudbuild.marketing.yaml \
#     --substitutions=_IMAGE=<registry>/marketing,_VERSION=<x.y.z-or-sha> \
#     --region <cloud-build-region> .
#
# Then deploy the built tag (image-only update preserves env/scaling/config):
#   gcloud run deploy wpmgr-marketing --image <registry>/marketing:<version> --region <run-region>
substitutions:
  _IMAGE: 'marketing'
  _VERSION: '0.0.0-dev'
steps:
  # DOCKER_BUILDKIT=1 is required: the Dockerfile uses BuildKit cache mounts
  # (RUN --mount=type=cache), which the legacy builder rejects.
  - name: 'gcr.io/cloud-builders/docker'
    env:
      - 'DOCKER_BUILDKIT=1'
    args:
      - 'build'
      - '-f'
      - 'infra/Dockerfile.marketing'
      - '-t'
      - '${_IMAGE}:${_VERSION}'
      - '-t'
      - '${_IMAGE}:latest'
      - '.'
images:
  - '${_IMAGE}:${_VERSION}'
  - '${_IMAGE}:latest'
options:
  machineType: 'E2_HIGHCPU_8'
