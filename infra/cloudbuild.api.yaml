# Reusable Cloud Build config for the WPMgr API image.
#
# The API binary stamps its version via -ldflags -X main.version (see
# infra/Dockerfile.api ARG VERSION). Pass the image ref and version as
# substitutions so this file carries no environment-specific values:
#
#   gcloud builds submit --config infra/cloudbuild.api.yaml \
#     --substitutions=_IMAGE=<registry>/api,_VERSION=<x.y.z> \
#     --region <cloud-build-region> .
#
# Then deploy the built tag (image-only update preserves env/scaling/config):
#   gcloud run deploy wpmgr-api --image <registry>/api:<x.y.z> --region <run-region>
substitutions:
  _IMAGE: 'api'
  _VERSION: '0.0.0-dev'
steps:
  # DOCKER_BUILDKIT=1 is required: the Dockerfiles use BuildKit cache mounts
  # (RUN --mount=type=cache), which the legacy builder rejects.
  - name: 'gcr.io/cloud-builders/docker'
    env:
      - 'DOCKER_BUILDKIT=1'
    args:
      - 'build'
      - '-f'
      - 'infra/Dockerfile.api'
      - '--build-arg'
      - 'VERSION=${_VERSION}'
      - '-t'
      - '${_IMAGE}:${_VERSION}'
      - '.'
images:
  - '${_IMAGE}:${_VERSION}'
options:
  machineType: 'E2_HIGHCPU_8'
