# WPMgr web — serves the Vite SPA with history-API fallback and reverse-proxies
# the control-plane API. ONE public hostname serves three surfaces:
#   - the dashboard SPA (static)            -> served from disk
#   - the dashboard API  (/api/v1/*)        -> proxied to api:8080 (prefix PRESERVED)
#   - the agent endpoints (/enroll, /agent/*)-> proxied to api:8080 (root API paths)
# The API's routes live under /api/v1, /enroll and /agent/v1 — so we must NOT strip
# the /api prefix, and we must explicitly proxy the agent's root paths (otherwise
# a POST to /enroll falls through to the SPA and nginx returns 405).

# Allow WebSocket upgrades to pass through; empty Connection for normal requests.
map $http_upgrade $wpmgr_conn_upgrade {
    default upgrade;
    ''      "";
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Manifests / metadata payloads from agents can be sizeable.
    client_max_body_size 64m;

    # ---- Security headers (applied to every response) --------------------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # CSP — same-origin by default with explicit exceptions for the bits the
    # SPA actually needs.
    #   style-src 'unsafe-inline'  — motion (Framer's successor) and Radix UI
    #     inject inline `style="transform:..."` at runtime; nonces aren't
    #     practical with our static-served build. Combined with Trusted Types
    #     this is acceptable for a first-party SPA without third-party scripts.
    #   style-src + font-src fonts.{googleapis,gstatic}.com — IBM Plex Sans /
    #     Mono are loaded via Google Fonts.
    #   img-src 'self' data: blob: https:  — 'self'/data/blob cover embedded SVG
    #     icons + chart blob URLs; `https:` is REQUIRED so the Media Optimizer
    #     tab can render attachment thumbnails served from each managed site's own
    #     origin (e.g. https://<site>/wp-content/uploads/...) and from presigned
    #     object-storage URLs. Tenant sites live on arbitrary domains, so they
    #     cannot be enumerated statically; `https:` (TLS-only — no mixed content)
    #     is the standard scope for an authenticated dashboard showing
    #     user-content images, which cannot execute script.
    #   connect-src 'self'   — SSE + REST are same-origin via /api/v1.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;

    # Docker embedded DNS so the "api" upstream resolves at request time (nginx
    # starts even if api isn't up yet).
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_upstream "api:8080";

    # Common proxy headers (inherited by the proxied locations below, since none
    # of them redefine proxy_set_header).
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $wpmgr_conn_upgrade;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Long-cache fingerprinted assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Dashboard API. PREFIX PRESERVED: the API serves routes under /api/v1, so
    # pass the URI through unchanged (no rewrite). proxy_buffering off so SSE
    # (/api/v1/updates/{id}/events) streams live.
    location /api/ {
        proxy_pass http://$api_upstream;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # Session auth endpoints (login/logout/me/register/oidc) — root API paths.
    location /auth/ {
        proxy_pass http://$api_upstream;
    }

    # Agent enrollment (public) — POST from the WordPress plugin.
    location = /enroll {
        proxy_pass http://$api_upstream;
    }

    # Agent-authenticated endpoints (metadata, heartbeat, backup presign/manifest).
    location /agent/ {
        proxy_pass http://$api_upstream;
        proxy_read_timeout 300s;
    }

    # Health endpoints proxied through for convenience.
    location = /healthz {
        proxy_pass http://$api_upstream/healthz;
    }
    location = /readyz {
        proxy_pass http://$api_upstream/readyz;
    }

    # Static crawlable legal pages — served before the SPA fallback so that
    # raw-HTML fetches (link-checkers, plugin-store reviewers) get real content
    # without JavaScript. The React routes /terms and /privacy still work for
    # in-app client-side navigation (the browser never hits nginx for those).
    location = /terms {
        default_type text/html;
        charset utf-8;
        try_files /terms.html =404;
    }
    location = /privacy {
        default_type text/html;
        charset utf-8;
        try_files /privacy.html =404;
    }

    # SPA fallback — everything else serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
